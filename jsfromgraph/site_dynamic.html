function evaluateGraphMultidual(rayDir, rayOrigin,t,graph,resultscache){
  t=new Vector(t);
  const x=new Multidual(Vector.add(rayOrigin.x(),t.mul(rayDir.x())),1,0,0,rayDir.x(),0,0);
  const y=new Multidual(Vector.add(rayOrigin.y(),t.mul(rayDir.y())),0,1,0,rayDir.y(),0,0);
  const z=new Multidual(Vector.add(rayOrigin.z(),t.mul(rayDir.z())),0,0,1,rayDir.z(),0,0);
  
  const nametovar=new Map([
    ["_V_X",x],
    ["_V_Y",y],
    ["_V_Z",z]
  ]);
  for(const [cpunode,gpunode]of graph.cpu_out_to_gpu_in.entries()){
    if(!resultscache.has(cpunode)){


      throw new Error("missing "+cpunode.name+" in cache");
    }
      //console.log("found "+cpunode.name+" in cache");
    nametovar.set(gpunode.operand.name,resultscache.get(cpunode));
  }


return visitnodes(graph.GPUgraph,(node,parentresults)=>{
            if(node.operand instanceof VarOperand) {

                if(nametovar.has(node.operand.name)){
                    return Multidual.promote(nametovar.get(node.operand.name));
                }else{
                    //console.log("missing variable "+node.operand.name);
                    //return new Multidual(0,0,0,0,0,0,0);
                    throw new Error("missing variable "+node.operand.name);
                }
            }
            if(node.operand instanceof AddOperand){
                return parentresults.reduce((prev,cur)=>prev.add(cur));
            }
            if(node.operand instanceof MulOperand){
                return parentresults.reduce((prev,cur)=>prev.mul(cur));
            }
            if(node.operand instanceof NegOperand){
                return parentresults[0].mul(-1);
            }
            if(node.operand instanceof ConstOperand){
                return Multidual.promote(node.operand.value);
            }
            if(node.operand instanceof DivOperand){
              //console.log("div "+parentresults[0]);
                return parentresults[0].div(parentresults[1]);//only maximal degree
            }
            throw new Error("bad operation :"+node.operand.constructor.name);
        },resultscache).get(graph.GPUgraph);
}

class Poly {
  constructor(coeffs) {
    for (const [key, value] of coeffs) {
      if (value === 0) {
        coeffs.delete(key);
      }
    }
    this.coeffs = coeffs; 
  }

  static monomialToKey(monomial) {
    return JSON.stringify(
      Object.fromEntries(
        Object.entries(monomial).filter(([k,v])=>v!=0).sort((a, b) => (a[0] > b[0] ? 1 : -1))
      )
    );
  }

  static keyToMonomial(key) {
    return JSON.parse(key);
  }

  static convert(x) {
    if (x instanceof Poly) return x;
    const key = Poly.monomialToKey({}); // constant term
    return new Poly(new Map([[key, x]]));
  }

  static var(varname, value = 1) {
    const key = Poly.monomialToKey({ [varname]: 1 });
    return new Poly(new Map([[key, value]]));
  }
  
  entries(){
    return this.coeffs.entries().map(([k,v])=>[Poly.keyToMonomial(k),v]);
  }

  add(other) {
    other = Poly.convert(other);
    const coeffs = new Map(this.coeffs);
    for (const [key, c] of other.coeffs) {
      coeffs.set(key, (coeffs.get(key) ?? 0) + c);
    }
    return new Poly(coeffs);
  }

  sub(other) {
    other = Poly.convert(other);
    const coeffs = new Map(this.coeffs);
    for (const [key, c] of other.coeffs) {
      coeffs.set(key, (coeffs.get(key) ?? 0) - c);
    }
    return new Poly(coeffs);
  }

  mul(other) {
    other = Poly.convert(other);
    const coeffs = new Map();

    const entriesB=[...other.entries()];
    for (const [monomA, coeffA] of this.entries()) {
      for (const [monomB, coeffB] of entriesB) {
        const monom = { ...monomA };
        for (const [variable, power] of Object.entries(monomB)) {
          monom[variable] = (monom[variable] ?? 0) + power;
        }
        const key = Poly.monomialToKey(monom);
        coeffs.set(key, (coeffs.get(key) ?? 0) + coeffA * coeffB);
      }
    }
    return new Poly(coeffs);
  }

  div(other) {
    other = Poly.convert(other);
    // Only supports monomial division
    if (other.coeffs.size !== 1) {
      throw new Error("only monomial division currently :(");
    }

    const [[monomDivisor, coeffDivisor]] = other.entries();

    const result = new Map();

    for (const [monomDividend, coeffDividend] of this.entries()) {

      // Subtract divisor exponents from dividend exponents
      for (const [variable, power] of Object.entries(monomDivisor)) {
        monomDividend[variable] = (monomDividend[variable] ?? 0) - power;
      }

      const keyResult = Poly.monomialToKey(monomDividend);
      result.set(keyResult, coeffDividend / coeffDivisor);
    }

    return new Poly(result);
  }

  equals(other) {
    other = Poly.convert(other);
    if (this.coeffs.size !== other.coeffs.size) return false;
    for (const [k, v] of this.coeffs) {
      if (other.coeffs.get(k) !== v) return false;
    }
    return true;
  }

  evaluate(point) {
    let result = 0;
    for (const [monom, coeff] of this.entries()) {
      let termVal = coeff;
      for (const [v, p] of Object.entries(monom)) {
        termVal *= (point[v] ?? 0) ** p;
      }
      result += termVal;
    }
    return result;
  }

  toString() {
    const terms = [];
    for (const [monom, coeff] of this.entries()) {
      const vars = Object.entries(monom)
        .map(([v, p]) => v + (p === 1 ? "" : "^" + p))
        .join("*");
      terms.push(`${coeff}${vars ? "*" + vars : ""}`);
    }
    return terms.length ? terms.join(" + ") : "0";
  }

  degree() {
    let maxDeg = 0;
    for (const key of this.coeffs.keys()) {
      const monom = Poly.keyToMonomial(key);
      const deg = Object.values(monom).reduce((a, b) => a + b, 0);
      if (deg > maxDeg) maxDeg = deg;
    }
    return maxDeg;
  }

  degreePerVariable() {
    const degrees = {};
    for (const key of this.coeffs.keys()) {
      const monom = Poly.keyToMonomial(key);
      for (const [variable, power] of Object.entries(monom)) {
        if (!(variable in degrees) || power > degrees[variable]) {
          degrees[variable] = power;
        }
      }
    }
    return degrees;
  }
}

class BasisConvert{

   static get dcga(){
    if(this._dcga==undefined){
    const x=Poly.var("_V_X");
    const y=Poly.var("_V_Y");
    const z=Poly.var("_V_Z");
    
    const xx=x.mul(x);
    const yy=y.mul(y);
    const zz=z.mul(z);

    const r=xx.add(yy).add(zz);
    const rp=(r.add(1)).mul(0.5);
    const rm=(r.add(-1)).mul(0.5);
    //console.log(r);
    //console.log(rm);

    const xy=x.mul(y);
    const yz=y.mul(z);
    const zx=z.mul(x);

    const xrp=x.mul(rp);
    const xrm=x.mul(rm);
    const yrp=y.mul(rp);
    const yrm=y.mul(rm);
    const zrp=z.mul(rp);
    const zrm=z.mul(rm);

    const rprp=rp.mul(rp);
    const rmrm=rm.mul(rm);
    const rprm=rp.mul(rm);

    const terms = [
      xx, xy, zx, xrm, xrp,
      yy, yz, yrm, yrp,
      zz, zrm, zrp,
      rmrm, rprm, rprp
    ];

     this._dcga=new BasisConvert(terms);
    }
    return this._dcga;
  }

  constructor(outputbasis) {
    this.outputbasis = outputbasis;

    // Collect all monomials used in any polynomial in the output basis
    const monoms = [...new Set(outputbasis.flatMap(poly => [...poly.coeffs.keys()]))];
    this.monoms = monoms;

    // Build the output basis matrix: each column is a basis polynomial's coefficients
    this.outputbasismat = transpose(
      outputbasis.map(basispoly =>
        monoms.map(m => basispoly.coeffs.get(m) ?? 0)
      )
    );

    // Precompute the pseudoinverse for fast conversion
    this.pinv = pinv(this.outputbasismat);
    console.log(this.pinv);

        //console.log(this.outputbasismat);
    //outputbasismat*row=monompoly
  }

 
  convert(monompoly){
    //outputbasismat*row=monompoly
    let hits=0;
    const monompolyrow=this.monoms.map(m=>{
      const variable=monompoly.coeffs.get(m);
      if(variable!==undefined)hits+=1;
      return variable ?? 0;
    });
    if(hits<monompoly.coeffs.size)
      throw Error("poly has monoms which are not in this basis :(");
    return multiply(this.pinv, monompolyrow);
  }
}

function DualSummofsquares(rayDir, rayOrigin,coefficients){

    //Multidual(f,dx,dy,dz,d1,d2,d3);
    const x=new Multidual(rayOrigin.x(),1,0,0,rayDir.x(),0,0);
    const y=new Multidual(rayOrigin.y(),0,1,0,rayDir.y(),0,0);
    const z=new Multidual(rayOrigin.z(),0,0,1,rayDir.z(),0,0);
    
    const xx=x.square();
    const yy=y.square();
    const zz=z.square();

    const r=xx.add(yy).add(zz);
    const rp=(r.add(1)).mul(0.5);
    const rm=(r.add(-1)).mul(0.5);

    const xy=x.mul(y);
    const yz=y.mul(z);
    const zx=z.mul(x);

    const xrp=x.mul(rp);
    const xrm=x.mul(rm);
    const yrp=y.mul(rp);
    const yrm=y.mul(rm);
    const zrp=z.mul(rp);
    const zrm=z.mul(rm);

    const rprp=rp.mul(rp);
    const rmrm=rm.mul(rm);
    const rprm=rp.mul(rm);

    const terms = [
      xx, xy, zx, xrm, xrp,
      yy, yz, yrm, yrp,
      zz, zrm, zrp,
      rmrm, rprm, rprp
    ];

    let sum=new Multidual(0,0,0,0,0,0,0);
    for(let j=0;j<coefficients.length;j++){

        let blade = new Multidual(0,0,0,0,0,0,0); // Start with first term
        for (let i = 0; i < terms.length; i++) {
          blade = blade.add(terms[i].mul(coefficients[j][i]));
        }

        sum=sum.add(blade.square());
    }
    return (sum);

    //[x**2, x*y, x*z, rm*x, rp*x, y**2, y*z, rm*y, rp*y, z**2, rm*z, rp*z, rm**2, rm*rp, rp**2]
}

// Vertex Shader
//this shader is so complicated because i wrote my raycasting code before this and then made this code to fit the raycasting logic
precision highp float;

in vec3 position;

uniform mat3 cameraMatrix;
uniform vec3 cameraPos;
uniform vec2 windowsize;


const float FOV=120.;
const float FOVfactor=1./tan(radians(FOV) * 0.5);

void main() {
    vec3 worldPos = position;
    vec3 viewVec = transpose(cameraMatrix) * (worldPos - cameraPos); // Transform to camera space

    // Reconstruct screen-space position (NDC) manually
    float x = FOVfactor*viewVec.x / ( viewVec.z);
    float y = FOVfactor*viewVec.y / ( viewVec.z)*(windowsize.x / windowsize.y);

    // Perspective projection manually: NDC.x/y in [-1, 1], z = normalized depth
    float z = length(viewVec)*sign(viewVec.z) / 1000.0; // Normalize depth to match raymarch

    // Convert z to NDC (-1 to 1): GPU expects this for depth
    float ndcZ = z * 2.0 - 1.0;

    gl_Position = vec4(x, y, ndcZ, 1.0);

    // Optional point size
    gl_PointSize = 3.0;
}`

class RenderContext {
  constructor(canvas, gl, camera=undefined) {
    this.canvas = canvas;
    this.gl = gl;

    
    
    this.setScale = this.setScale.bind(this);
    window.addEventListener("resize", this.setScale);


    this.highResolutionScale = 0.3;
    this.lowResolutionScale = 0.2;
    this.stillTime = performance.now();
    this.setScale(this.lowResolutionScale);//sets scale



    this.camera = camera ?? new Cameracontroll(canvas, gl);
    this.params = new Map(); // key-value store for parameters
    this.nodecache= new Map(); 
    this.paramsversion=0;

    this.objects=new Map();;//list of RenderObjects
  }

  addObject(obj){
    obj.ctx=this;
    if(this.objects.has(obj.name))
      console.warn("added object twice");
    this.objects.set(obj.name,obj);
  }

  pipelineChanged(){
    this.camera.changed=true;
  }

  render(){
    const gl=this.gl;
    gl.clearColor(0.0, 0.0, 0.0, 1.0);
    gl.clear(gl.COLOR_BUFFER_BIT | gl.DEPTH_BUFFER_BIT);
    
    //gl.disable(gl.DEPTH_TEST);
    for(const object of this.objects.values()){
      object.render(this);
    }
    gl.finish();
  }

  paramsChanged(){
    this.nodecache=new Map(this.params);
    this.paramsversion = (this.paramsversion + 1) % Number.MAX_SAFE_INTEGER;//the modulo is useless because it wont overflow for years if you call this thousends of times per seccond
    
  }

  updateParams(){
    for(const object of this.objects.values()){
      object.updateParams(this);
    }
  }
   
  update(deltatime){
    this.camera.update(deltatime);

    const now = performance.now();
    const moving = this.camera.changed;
    let changed=this.camera.changed;

    if(this.highResolutionScale==this.lowResolutionScale){
        //pass 
    }else if (moving) {
      this.stillTime = now;
      if (!this.isLowRes) {
        this.setScale(this.lowResolutionScale);
        //console.log("set to low res");
        changed=true;
      };
      
    }else if (this.isLowRes && (now - this.stillTime > 500)) {//not moving for 0.5 sec
      this.setScale(this.highResolutionScale);
        //console.log("set to high res");

      changed=true;
    }

    this.camera.changed=false;
    return changed;


  }

  get isLowRes(){return this.scale<this.highResolutionScale;}
  get clientResolution(){
    //actual canvas res in pixel
    return [this.canvas.clientWidth, this.canvas.clientHeight];
  }

  get resolution(){
    //canvas res for rendering
    return [this.canvas.width,this.canvas.height];
  }

  setScale(scale=undefined) {
    if(scale)this.scale=scale;
    const dpr = window.devicePixelRatio || 1;
    const width = Math.floor(this.canvas.clientWidth * dpr * this.scale);
    const height = Math.floor(this.canvas.clientHeight * dpr * this.scale);
    this.canvas.width = width;
    this.canvas.height = height;
  }

  updateUniforms(shader) {
    this.camera.updateuniforms(shader);
    this.updateUniformWindowsize(shader);
  }
  updateUniformWindowsize(shader){
    const resLoc = shader.getUniformLocation("windowsize");
    if (resLoc) shader.gl.uniform2fv(resLoc, this.resolution);
  }
  updateViewport(gl=undefined){
    gl??=this.gl;
    const [w, h] = this.resolution;
    gl.viewport(0, 0, w, h);

    //const windowsizeLocation = this.pointshader.getUniformLocation('windowsize');
    //shader.gl.uniform2fv(windowsizeLocation, this.resolution);
  }
  bindquad() {
    if (this._quad === undefined) {
      const gl = this.gl;
      const vertices = new Float32Array([
        -1, 1,
        -1, -1,
        1, 1,
        1, -1
      ]);

      this._quad= gl.createBuffer();
      gl.bindBuffer(gl.ARRAY_BUFFER, this._quad );
      gl.bufferData(gl.ARRAY_BUFFER, vertices, gl.STATIC_DRAW);
    }
    gl.bindBuffer(gl.ARRAY_BUFFER, this._quad );
  }

  bindquadvao(){
    if (this._quadvao === undefined) {
      this._quadvao = gl.createVertexArray();
      gl.bindVertexArray(this._quadvao);
      const loc = 0;//this.shader.getAttribLocation("a_position");
      this.bindquad();
      gl.enableVertexAttribArray(loc);
      gl.vertexAttribPointer(loc, 2, gl.FLOAT, false, 0, 0);
    }
    gl.bindVertexArray(this._quadvao);
    //return this._quadvao;
  }
  
}




class RenderableObject {
  constructor(name,context) {
    this.name = name;
    this.pipelines = new Map(); // methodName -> ShaderPipeline
    this.activePipelineName = null;
    this.ctx=context;
  }

  get activePipeline() {
    return this.pipelines.get(this.activePipelineName);
  }

  setActivePipeline(name) {
    if(name==null){
      this.activePipelineName=null;
      return;
    }

    if (!this.pipelines.has(name)) {
      console.warn("pipline option doesnt exist");
    }
    if(this.activePipelineName==name)return;
    this.activePipelineName = name;
    this.activePipeline?.init();//inits the lazy pipeline
    this.ctx.pipelineChanged();
  }

  updateParams() {
    const pipeline = this.activePipeline;
    if (pipeline) pipeline.updateParams(this.ctx);
  }

  render() {
    const pipeline = this.activePipeline;
    if (pipeline) pipeline.render(this.ctx);
  }
}


class LazyRenderingPipeline{
  constructor(initFn) {
    this._initFn = initFn;
    this._initialized = false;
  }

  init() {
    if (!this._initialized) {
      this._initFn();
      this._initialized = true;
      return true;
    }
    return false;
  }
  render(ctx){
    throw new Error("method not implemented");
  }
  updateParams(ctx){
    throw new Error("method not implemented");
  }
}

class simplerenderer extends LazyRenderingPipeline{

  constructor(ctx,gl,visgraph,fragmentShaderSourceTemplate,color){
    super(()=>{
      const frag=visgraph.gencode(fragmentShaderSourceTemplate);

      this.shader=new Shader(gl, passThroughVertexShaderSource,frag );
      this.shader.use();
      
      gl.uniform4fv(this.shader.getUniformLocation('incolor'), [color.r,color.g,color.b,1.0]);
      
      this.visgraph=visgraph;

    })
  }
  render(ctx){
    const gl=ctx.gl;
    gl.depthFunc(gl.LESS);
    gl.enable(gl.DEPTH_TEST);
    this.shader.use();
    ctx.bindquadvao();
    ctx.updateViewport();
    ctx.updateUniforms(this.shader);
    //gl.bindBuffer(gl.ARRAY_BUFFER, ctx.quad );
    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);

    
  }
  updateParams(ctx){
    if(this.paramsversion==ctx.paramsversion)return;
    this.paramsversion=ctx.paramsversion;
    this.shader.use();
    this.visgraph.setuniforms(ctx.nodecache,this.shader);

  }
}

class pointcloudrenderer extends LazyRenderingPipeline{

  static pointshader=null;
  constructor(gl,visgraph,axis_aligned_glsl,color){
    super(()=>{
      this.orthwh=[100,100];
      const text_frame=pointcloudrenderer.createRootOutputTextures(gl,this.orthwh[0],this.orthwh[1]);
      this.framebuffer=text_frame[1];
      this.textures=text_frame[0];

      this.gl=gl;

      const frag=visgraph.gencode(axis_aligned_glsl);
    const orthshader=new Shader(gl, passThroughVertexShaderSource,frag );
    orthshader.use();
      //this.context=context;
      this.orthshader=orthshader;  


      this.pointbuffer = gl.createBuffer();
      gl.bindBuffer(gl.ARRAY_BUFFER, this.pointbuffer);

      pointcloudrenderer.pointshader ??= new Shader(gl, vShader, fShader);

      this.color=color;
      


      this.pointvao=gl.createVertexArray();
      gl.bindVertexArray(this.pointvao);
      gl.bindBuffer(gl.ARRAY_BUFFER,  this.pointbuffer);
      const positionAttribLoc=pointcloudrenderer.pointshader.getAttribLocation("position");
      gl.enableVertexAttribArray(positionAttribLoc);
      gl.vertexAttribPointer(positionAttribLoc, 3, gl.FLOAT, false, 0, 0);
      

      /*const allpoints = this.renderorth();
      //const pointBuffers = allpoints.map(obj => new Float32Array(obj.flat()));
      //... make openglbuffer
      console.log(allpoints);
      this.pointBuffers = allpoints.map(obj => {
        const flatData = new Float32Array(obj.flat());//TODO fix this uglyly chatgpt code
        const buffer = gl.createBuffer();
        gl.bindBuffer(gl.ARRAY_BUFFER, buffer);
        gl.bufferData(gl.ARRAY_BUFFER, flatData, gl.STATIC_DRAW);
        return { buffer, count: flatData.length / 3 };
      });*/


      //...make point renderer
      this.count=0;
      
    });
  }

  updateParams(ctx){
    if(this.paramsversion==ctx.paramsversion)return;
    this.paramsversion=ctx.paramsversion;

    

    const gl = this.gl;
    
    const attachments = [
      gl.COLOR_ATTACHMENT0,
      gl.COLOR_ATTACHMENT1,
      gl.COLOR_ATTACHMENT2,
      gl.COLOR_ATTACHMENT3
    ];
    

    const [w, h] = this.orthwh;
    const pixelbuffer = new Float32Array(w * h * 4);

    const projections = [
      // +X axis
      new Matrix([
        [0, 0, 1],
        [0, 1, 0],
        [-1, 0, 0]
      ]),
      // +Y axis
      new Matrix([
        [1, 0, 0],
        [0, 0, 1],
        [0, -1, 0]
      ]),
      // +Z axis
      new Matrix([
        [1, 0, 0],
        [0, 1, 0],
        [0, 0, 1]
      ])
    ];


   
    
    const points = [];

    this.orthshader.use();
    this.visgraph.setuniforms(ctx.nodecache,this.orthshader);
    gl.bindFramebuffer(gl.FRAMEBUFFER, this.framebuffer);
    gl.drawBuffers(attachments);
    
    ctx.bindquadvao();

    gl.viewport(0,0,w,h);

    const windowsizeLocation = this.orthshader.getUniformLocation('windowsize');
    gl.uniform2fv(windowsizeLocation, [w, h]);
    const scale=5.;
    for (let projection of projections) {
      projection=projection.mul(scale);
      const axis = projection.mul(new Vector([0, 0, 1]));

      const c2wLocation = this.orthshader.getUniformLocation("cameraMatrix");
      gl.uniformMatrix3fv(c2wLocation, true, new Float32Array(projection.array.flat()));

      
      
      
      gl.clear(gl.COLOR_BUFFER_BIT | gl.DEPTH_BUFFER_BIT);
      gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);

      for (const attachment of attachments) {
        gl.readBuffer(attachment);
        gl.readPixels(0, 0, w, h, gl.RGBA, gl.FLOAT, pixelbuffer);

        

        for (let y = 0; y < h; y++) {
          for (let x = 0; x < w; x++) {
            const idx = 4 * (y * w + x);
            
            const uv = new Vector([
              (2 * x - w) / w,
              (2 * y - h) / h,
              0
            ]);
            const ro = projection.mul(uv);

            for (const i of [0, 2]) {
              const a = pixelbuffer[idx + i];
              const imag = pixelbuffer[idx + i + 1];
              if (!Number.isFinite(a) || !Number.isFinite(imag)||imag>0.01) continue;
              const pt = ro.add(axis.mul(a));
              points.push(pt.array);
            }
          }
        }
      }
    }


    
    gl.bindVertexArray(null);
    gl.bindFramebuffer(gl.FRAMEBUFFER, null);

    gl.bindBuffer(gl.ARRAY_BUFFER, this.pointbuffer);
    this.count=points.length;
    gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(points.flat()), gl.STATIC_DRAW);


  }

  render(ctx) {
    const gl = this.gl;
    //gl.bindVertexArray(null);

    // Render to the screen (default framebuffer)

    gl.depthFunc(gl.LESS);
    gl.enable(gl.DEPTH_TEST);
    pointcloudrenderer.pointshader.use();
    gl.uniform4fv(pointcloudrenderer.pointshader.getUniformLocation('incolor'), [this.color.r,this.color.g,this.color.b,1.0]);

    gl.bindFramebuffer(gl.FRAMEBUFFER, null);
    ctx.updateUniforms(pointcloudrenderer.pointshader); // sets cameraPos and cameraMatrix and windowsize
    ctx.updateViewport(gl);


    gl.bindVertexArray(this.pointvao);
    gl.drawArrays(gl.POINTS, 0, this.count);
    
    //gl.enable(gl.DEPTH_TEST);


    //gl.finish();
  }

  static createRootOutputTextures(gl, width, height) {
    const textures = [];
    const attachments = [
      gl.COLOR_ATTACHMENT0,
      gl.COLOR_ATTACHMENT1,
      gl.COLOR_ATTACHMENT2,
      gl.COLOR_ATTACHMENT3
    ];
    const framebuffer = gl.createFramebuffer();
    gl.bindFramebuffer(gl.FRAMEBUFFER, framebuffer);

    for (const attachment of attachments) {
      const tex = gl.createTexture();
      gl.bindTexture(gl.TEXTURE_2D, tex);
      gl.texImage2D(
        gl.TEXTURE_2D, 0, gl.RGBA32F,//gl.RGBA16F,
        width, height, 0,
        gl.RGBA, gl.FLOAT, null
      );
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.NEAREST);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.NEAREST);
      gl.framebufferTexture2D(
        gl.FRAMEBUFFER, attachment, gl.TEXTURE_2D, tex, 0
      );
      textures.push(tex);
    }

    const status = gl.checkFramebufferStatus(gl.FRAMEBUFFER);
    if (status !== gl.FRAMEBUFFER_COMPLETE) {
      console.error("Framebuffer incomplete:", status);
    }

    return [textures,framebuffer];
  }

}

class matrixrenderer{
  constructor(visgraph){
    this.visgraph=visgraph;
    this.extractPolynomials();


  }
  extractPolynomials(){

    //first convert gpu code to a polynom
    const nametovar=new Map([
      ["_V_X",Poly.var("_V_X")],
      ["_V_Y",Poly.var("_V_Y")],
      ["_V_Z",Poly.var("_V_Z")]
    ]);
    for(const [cpunode,gpunode]of this.visgraph.cpu_out_to_gpu_in.entries()){
      nametovar.set(gpunode.operand.name,Poly.var(gpunode.operand.name));
    }

    console.log(this.visgraph.gencode("float Summofsquares(vec3 rayDir, vec3 rayOrigin,float a){?}"));
    
    
    const nodecache= visitnodes(this.visgraph.outputnodes,(node,parentresults)=>{
      if(node.operand instanceof VarOperand) {

          if(nametovar.has(node.operand.name)){
              return nametovar.get(node.operand.name);
          }else{
              //console.log("missing variable "+node.operand.name);
              //return new Multidual(0,0,0,0,0,0,0);
              throw new Error("missing variable "+node.operand.name);
          }
      }
      if(node.operand instanceof AddOperand){
          return parentresults.reduce((prev,cur)=>prev.add(cur));
      }
      if(node.operand instanceof MulOperand){
          return parentresults.reduce((prev,cur)=>prev.mul(cur));
      }
      if(node.operand instanceof NegOperand){
          return parentresults[0].mul(-1);
      }
      if(node.operand instanceof ConstOperand){
          return Poly.convert(node.operand.value);
      }
      if(node.operand instanceof DivOperand){
        //console.log("div "+parentresults[0]);
          return parentresults[0].div(parentresults[1]);//only maximal degree
      }
      throw new Error("bad operation :"+node.operand.constructor.name);
    });

    /**@type {Poly[]} */
    const outputnodes=this.visgraph.outputnodes.map(node=>nodecache.get(node));//list of polynoms
    for(const poly of outputnodes){console.log(poly,poly.toString());}
    const xyzstrings=new Set(["_V_X","_V_Y","_V_Z"]);
    /** {Map<string,Poly>[]} */
    /**@type {Map<string,number[]>[]} */
    const outputpolyspervarperrow=outputnodes.map((poly)=>{// sorts monoms per variable  a*x+a*y+b*z->a:x+y,b:z
      const polymap=new Map();
      for(let [monom, value] of poly.entries()){
        /**@type {String[]} */
        const variables=Object.keys(monom).filter(v => !xyzstrings.has(v));
        if(variables.length>1)throw new Error("transformation is not linear but it should be :(");
        let varname;
        if(variables.length==1){
          varname=variables[0];
          if(monom[varname]!=1)throw new Error("transformation is not linear but it should be :(");
          delete monom[varname];
        }else{
          varname="";
        }

        if (!polymap.has(varname)) polymap.set(varname, new Poly(new Map()));//set default
        polymap.get(varname).coeffs.set(Poly.monomialToKey(monom),value);
      }


      /**@type {Map<string,number[]>[]} */
      const outputrowspervar=new Map(
        polymap.entries().map(
          ([varname,poly])=>[varname,BasisConvert.dcga.convert(poly)]
        )
      );
      


      return outputrowspervar;
    });
    console.log(outputpolyspervarperrow);






    throw new Error("This code is only half finished. please continue here lol");
  }
}
