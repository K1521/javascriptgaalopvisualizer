function evaluateGraphMultidual(rayDir, rayOrigin,t,graph,resultscache){
  t=new Vector(t);
  const x=new Multidual(Vector.add(rayOrigin.x(),t.mul(rayDir.x())),1,0,0,rayDir.x(),0,0);
  const y=new Multidual(Vector.add(rayOrigin.y(),t.mul(rayDir.y())),0,1,0,rayDir.y(),0,0);
  const z=new Multidual(Vector.add(rayOrigin.z(),t.mul(rayDir.z())),0,0,1,rayDir.z(),0,0);
  
  const nametovar=new Map([
    ["_V_X",x],
    ["_V_Y",y],
    ["_V_Z",z]
  ]);
  for(const [cpunode,gpunode]of graph.cpu_out_to_gpu_in.entries()){
    if(!resultscache.has(cpunode)){


      throw new Error("missing "+cpunode.name+" in cache");
    }
      //console.log("found "+cpunode.name+" in cache");
    nametovar.set(gpunode.operand.name,resultscache.get(cpunode));
  }


return visitnodes(graph.GPUgraph,(node,parentresults)=>{
            if(node.operand instanceof VarOperand) {

                if(nametovar.has(node.operand.name)){
                    return Multidual.promote(nametovar.get(node.operand.name));
                }else{
                    //console.log("missing variable "+node.operand.name);
                    //return new Multidual(0,0,0,0,0,0,0);
                    throw new Error("missing variable "+node.operand.name);
                }
            }
            if(node.operand instanceof AddOperand){
                return parentresults.reduce((prev,cur)=>prev.add(cur));
            }
            if(node.operand instanceof MulOperand){
                return parentresults.reduce((prev,cur)=>prev.mul(cur));
            }
            if(node.operand instanceof NegOperand){
                return parentresults[0].mul(-1);
            }
            if(node.operand instanceof ConstOperand){
                return Multidual.promote(node.operand.value);
            }
            if(node.operand instanceof DivOperand){
              //console.log("div "+parentresults[0]);
                return parentresults[0].div(parentresults[1]);//only maximal degree
            }
            throw new Error("bad operation :"+node.operand.constructor.name);
        },resultscache).get(graph.GPUgraph);
}

class Poly {
  constructor(coeffs) {
    for (const [key, value] of coeffs) {
      if (value === 0) {
        coeffs.delete(key);
      }
    }
    this.coeffs = coeffs; 
  }

  static monomialToKey(monomial) {
    return JSON.stringify(
      Object.fromEntries(
        Object.entries(monomial).filter(([k,v])=>v!=0).sort((a, b) => (a[0] > b[0] ? 1 : -1))
      )
    );
  }

  static keyToMonomial(key) {
    return JSON.parse(key);
  }

  static convert(x) {
    if (x instanceof Poly) return x;
    const key = Poly.monomialToKey({}); // constant term
    return new Poly(new Map([[key, x]]));
  }

  static var(varname, value = 1) {
    const key = Poly.monomialToKey({ [varname]: 1 });
    return new Poly(new Map([[key, value]]));
  }
  
  entries(){
    return this.coeffs.entries().map(([k,v])=>[Poly.keyToMonomial(k),v]);
  }

  add(other) {
    other = Poly.convert(other);
    const coeffs = new Map(this.coeffs);
    for (const [key, c] of other.coeffs) {
      coeffs.set(key, (coeffs.get(key) ?? 0) + c);
    }
    return new Poly(coeffs);
  }

  sub(other) {
    other = Poly.convert(other);
    const coeffs = new Map(this.coeffs);
    for (const [key, c] of other.coeffs) {
      coeffs.set(key, (coeffs.get(key) ?? 0) - c);
    }
    return new Poly(coeffs);
  }

  mul(other) {
    other = Poly.convert(other);
    const coeffs = new Map();

    const entriesB=[...other.entries()];
    for (const [monomA, coeffA] of this.entries()) {
      for (const [monomB, coeffB] of entriesB) {
        const monom = { ...monomA };
        for (const [variable, power] of Object.entries(monomB)) {
          monom[variable] = (monom[variable] ?? 0) + power;
        }
        const key = Poly.monomialToKey(monom);
        coeffs.set(key, (coeffs.get(key) ?? 0) + coeffA * coeffB);
      }
    }
    return new Poly(coeffs);
  }

  div(other) {
    other = Poly.convert(other);
    // Only supports monomial division
    if (other.coeffs.size !== 1) {
      throw new Error("only monomial division currently :(");
    }

    const [[monomDivisor, coeffDivisor]] = other.entries();

    const result = new Map();

    for (const [monomDividend, coeffDividend] of this.entries()) {

      // Subtract divisor exponents from dividend exponents
      for (const [variable, power] of Object.entries(monomDivisor)) {
        monomDividend[variable] = (monomDividend[variable] ?? 0) - power;
      }

      const keyResult = Poly.monomialToKey(monomDividend);
      result.set(keyResult, coeffDividend / coeffDivisor);
    }

    return new Poly(result);
  }

  equals(other) {
    other = Poly.convert(other);
    if (this.coeffs.size !== other.coeffs.size) return false;
    for (const [k, v] of this.coeffs) {
      if (other.coeffs.get(k) !== v) return false;
    }
    return true;
  }

  evaluate(point) {
    let result = 0;
    for (const [monom, coeff] of this.entries()) {
      let termVal = coeff;
      for (const [v, p] of Object.entries(monom)) {
        termVal *= (point[v] ?? 0) ** p;
      }
      result += termVal;
    }
    return result;
  }

  toString() {
    const terms = [];
    for (const [monom, coeff] of this.entries()) {
      const vars = Object.entries(monom)
        .map(([v, p]) => v + (p === 1 ? "" : "^" + p))
        .join("*");
      terms.push(`${coeff}${vars ? "*" + vars : ""}`);
    }
    return terms.length ? terms.join(" + ") : "0";
  }

  degree() {
    let maxDeg = 0;
    for (const key of this.coeffs.keys()) {
      const monom = Poly.keyToMonomial(key);
      const deg = Object.values(monom).reduce((a, b) => a + b, 0);
      if (deg > maxDeg) maxDeg = deg;
    }
    return maxDeg;
  }

  degreePerVariable() {
    const degrees = {};
    for (const key of this.coeffs.keys()) {
      const monom = Poly.keyToMonomial(key);
      for (const [variable, power] of Object.entries(monom)) {
        if (!(variable in degrees) || power > degrees[variable]) {
          degrees[variable] = power;
        }
      }
    }
    return degrees;
  }
}

function rankQR(matrix, eps = 1e-10) {
  const { R } = qr(matrix);
  let rank = 0;
  console.log(R);

  for (let row of R) {
    const nonZero = row.some(val => Math.abs(val) > eps);
    if (nonZero) rank++;
  }

  return rank;
}

  static makepermutation(from,to){
    if(from.length!=to.length){throw new Error("length mismatch");}
    if((new Set(to)).size!=to.length){throw new Error("to has duplicate entries");}
    const reorderingmap=new Map(from.map((v,i)=>[v,i]));
    if(reorderingmap.size!=from.length){throw new Error("from has duplicate entries");}
    const reordering=to.map(t=>{
      const v=reorderingmap.get(t);
      if(v===undefined)throw new Error("mismatched entries");
      return v;
    });
    return reordering;
  }

  constructor(outputbasis,gpuorder=undefined) {
    this.outputbasis = outputbasis;
    this.basisdegrees=outputbasis.map(b=>b.degree());

    

    this.gpuorder=gpuorder;// ?? [...outputbasis.keys()];//outputbasis.keys()==range(len(outputbasis))


    // Collect all monomials used in any polynomial in the output basis
    const monoms = [...new Set(outputbasis.flatMap(poly => [...poly.coeffs.keys()]))];
    this.monoms = monoms;

    // Build the output basis matrix: each column is a basis polynomial's coefficients
    this.outputbasismat = transpose(
      outputbasis.map(basispoly =>
        monoms.map(m => basispoly.coeffs.get(m) ?? 0)
      )
    );

    //console.log(rankQR(this.outputbasismat));
    //throw new Error();

    // Precompute the pseudoinverse for fast conversion
    this.pinv = pinv(this.outputbasismat);
    this.basislength=this.outputbasis.length;
    console.log(this.pinv);

        //console.log(this.outputbasismat);
    //outputbasismat*row=monompoly
  }

  calcMaxDegree(M) {
    let maxDegree = 0;

    for (const row of M) {
      for (let i = 0; i < row.length; i++) {
        const coeff = row[i];
        if (coeff !== 0) {
          maxDegree = Math.max(this.basisdegrees[i], maxDegree);
        }
      }
    }

    return maxDegree;
  }

  reorder(M){
    if(this.gpuorder===undefined)return M;
    return M.map(row=>{
        const reorderedrow=this.gpuorder.map(i=>row[i]);
        return reorderedrow;
      });
  }
  

 
  convert(monompoly){
    //outputbasismat*row=monompoly
    let hits=0;
    const monompolyrow=this.monoms.map(m=>{
      const variable=monompoly.coeffs.get(m);
      if(variable!==undefined)hits+=1;
      return variable ?? 0;
    });
    if(hits<monompoly.coeffs.size)
      throw Error("poly has monoms which are not in this basis :(");
    return multiply(this.pinv, monompolyrow);
  }
}

function DualSummofsquares(rayDir, rayOrigin,coefficients){

    //Multidual(f,dx,dy,dz,d1,d2,d3);
    const x=new Multidual(rayOrigin.x(),1,0,0,rayDir.x(),0,0);
    const y=new Multidual(rayOrigin.y(),0,1,0,rayDir.y(),0,0);
    const z=new Multidual(rayOrigin.z(),0,0,1,rayDir.z(),0,0);
    
    const xx=x.square();
    const yy=y.square();
    const zz=z.square();

    const r=xx.add(yy).add(zz);
    const rp=(r.add(1)).mul(0.5);
    const rm=(r.add(-1)).mul(0.5);

    const xy=x.mul(y);
    const yz=y.mul(z);
    const zx=z.mul(x);

    const xrp=x.mul(rp);
    const xrm=x.mul(rm);
    const yrp=y.mul(rp);
    const yrm=y.mul(rm);
    const zrp=z.mul(rp);
    const zrm=z.mul(rm);

    const rprp=rp.mul(rp);
    const rmrm=rm.mul(rm);
    const rprm=rp.mul(rm);

    const terms = [
      xx, xy, zx, xrm, xrp,
      yy, yz, yrm, yrp,
      zz, zrm, zrp,
      rmrm, rprm, rprp
    ];

    let sum=new Multidual(0,0,0,0,0,0,0);
    for(let j=0;j<coefficients.length;j++){

        let blade = new Multidual(0,0,0,0,0,0,0); // Start with first term
        for (let i = 0; i < terms.length; i++) {
          blade = blade.add(terms[i].mul(coefficients[j][i]));
        }

        sum=sum.add(blade.square());
    }
    return (sum);

    //[x**2, x*y, x*z, rm*x, rp*x, y**2, y*z, rm*y, rp*y, z**2, rm*z, rp*z, rm**2, rm*rp, rp**2]
}

      this.requestRender();
    });
    window.dispatchEvent(new Event("resize"));


    


    this.changed=true;
    this.moved=true;
    this.camera.onChange=this.camMoved;
  }

  addObject(obj){
    obj.ctx=this;
    if(this.objects.has(obj.name))
      console.warn("added object twice");
    this.objects.set(obj.name,obj);
  }

  requestRender(){
    this.changed=true;
    //console.log("changed");
  }

  camMoved(){
    this.requestRender();
    this.moved=true
    //console.log("changed");
  }

  

  render(deltatime,force=false){
    this.camera.update(deltatime);
    this.multires.update();

    if(!(this.changed||force))return false;
    this.changed=false;
    this.moved=false;
    
    this.multires.render();
    return true;
  }



  paramsChanged(newparams=undefined){
    this.params=newparams??this.params;
    this.nodecache=new Map(this.params);
    this.paramsversion = (this.paramsversion + 1) % Number.MAX_SAFE_INTEGER;//the modulo is useless because it wont overflow for years if you call this thousends of times per seccond
    
  }

  updateParams(){
    for(const object of this.objects.values()){
      object.updateParams(this);
    }
  }
   
  


  get clientResolution(){
    //actual canvas res in pixel
    const canvas=this.canvas;
    return [canvas.clientWidth, canvas.clientHeight];
  }

  get resolution(){
    //canvas res for rendering
    const canvas=this.canvas;
    return [canvas.width,canvas.height];
  }
  updateUniforms(shader) {
    this.camera.updateuniforms(shader);
    this.updateUniformWindowsize(shader);
  }
  updateUniformWindowsize(shader){
    const windowsizeLoc = shader.getUniformLocation("windowsize");
    if (windowsizeLoc) shader.gl.uniform2fv(windowsizeLoc, this.resolution);


    const focalLoc = shader.getUniformLocation("focal");
    if (focalLoc) {
      const fovDeg = 120;
      const aspect =  this.resolution[0] /  this.resolution[1];
      const f = 1.0 / Math.tan(radians(fovDeg) * 0.5);

      const focal = [f, f*aspect]; // x = horizontal focal, y = vertical focal //fov in x dir
      //const focal = [f/aspect, f]; // x = horizontal focal, y = vertical focal //fov in y dir
      shader.uniform2fv("focal", focal);
    }

   

  }
  updateViewport(gl=undefined){
    gl??=this.gl;
    const [w, h] = this.resolution;
    //gl.viewport(0, 0, w, h);
    gl.viewport(0, 0, w, h);

    //const windowsizeLocation = this.pointshader.getUniformLocation('windowsize');
    //shader.gl.uniform2fv(windowsizeLocation, this.resolution);

  bindquad() {
    if (this._quad === undefined) {
      const gl = this.gl;
      const vertices = new Float32Array([
        -1, 1,
        -1, -1,
        1, 1,
        1, -1
      ]);

      this._quad= gl.createBuffer();
      gl.bindBuffer(gl.ARRAY_BUFFER, this._quad );
      gl.bufferData(gl.ARRAY_BUFFER, vertices, gl.STATIC_DRAW);
    }
    gl.bindBuffer(gl.ARRAY_BUFFER, this._quad );
  }

  bindquadvao(){
    if (this._quadvao === undefined) {
      this._quadvao = gl.createVertexArray();
      gl.bindVertexArray(this._quadvao);
      const loc = 0;//this.shader.getAttribLocation("uv");
      this.bindquad();
      gl.enableVertexAttribArray(loc);
      gl.vertexAttribPointer(loc, 2, gl.FLOAT, false, 0, 0);
    }
    gl.bindVertexArray(this._quadvao);
    //return this._quadvao;
  }
  
}




class RenderableObject {
  constructor(name,context) {
    this.name = name;
    this.pipelines = new Map(); // methodName -> ShaderPipeline
    this.activePipelineName = null;
    this.ctx=context;
  }



  addPipeline(name,pipeline){
    if(this.pipelines.has(name))throw new Error("option already exists");
    this.pipelines.set(name,pipeline);
    pipeline.setRenderableObject(this);
  }

  get activePipeline() {
    return this.pipelines.get(this.activePipelineName);
  }

  setActivePipeline(name) {
    if(name==null || name==""){
      this.activePipelineName=null;
      this.ctx.requestRender();
      return;
    }

    if (!this.pipelines.has(name)) {
      console.warn("pipline option doesnt exist");
    }
    if(this.activePipelineName==name)return;
    this.activePipelineName = name;
    this.activePipeline?.init();//inits the lazy pipeline
    this.ctx.requestRender();
  }

updateParams() {
  this.activePipeline?.updateParams(this.ctx);
}

render() {
  this.activePipeline?.render(this.ctx);
}

isTilable() {
  return this.activePipeline?.isTilable();
}


  
}


class LazyRenderingPipeline{
  constructor(initFn) {
    this._initFn = initFn;
    this._initialized = false;
  }

  init() {
    if (!this._initialized) {
      this._initFn();
      this._initialized = true;
      return true;
    }
    return false;
  }
  render(ctx){
    throw new Error("method not implemented");
  }
  updateParams(ctx){
    throw new Error("method not implemented");
  }

  setRenderableObject(obj){
    this._obj=obj;
  }
  isTilable(){return false;}
}

  updateParams(ctx){
    if(this.paramsversion==ctx.paramsversion)return;
    this.paramsversion=ctx.paramsversion;
    

    const gl = this.gl;
    
    const attachments = [
      gl.COLOR_ATTACHMENT0,
      gl.COLOR_ATTACHMENT1,
      gl.COLOR_ATTACHMENT2,
      gl.COLOR_ATTACHMENT3
    ];
    

    const s=this.orthsize;
    const pixelbuffer = new Float32Array(s*s * 4);

    const projections = [
      // +X axis
      new Matrix([
        [0, 0, 1],
        [0, 1, 0],
        [-1, 0, 0]
      ]),
      // +Y axis
      new Matrix([
        [1, 0, 0],
        [0, 0, 1],
        [0, -1, 0]
      ]),
      // +Z axis
      new Matrix([
        [1, 0, 0],
        [0, 1, 0],
        [0, 0, 1]
      ])
    ];


   
    
    const points = [];

    this.orthshader.use();
    this.visgraph.setuniforms(ctx.nodecache,this.orthshader);
    gl.bindFramebuffer(gl.FRAMEBUFFER, this.framebuffer);
    gl.drawBuffers(attachments);
    
    //ctx.bindquadvao();

    gl.viewport(0,0,s,s);

    const windowsizeLocation = this.orthshader.getUniformLocation('windowsize');
    gl.uniform2fv(windowsizeLocation, [s,s]);
    const scale=5.;
    for (let projection of projections) {
      projection=projection.mul(scale);
      const axis = projection.mul(new Vector([0, 0, 1]));

      const c2wLocation = this.orthshader.getUniformLocation("cameraMatrix");
      gl.uniformMatrix3fv(c2wLocation, true, new Float32Array(projection.array.flat()));

      
      
      
      gl.clear(gl.COLOR_BUFFER_BIT | gl.DEPTH_BUFFER_BIT);
      gl.drawArrays(gl.TRIANGLES, 0, 3);

      for (const attachment of attachments) {

        gl.readPixels(0, 0, s,s, gl.RGBA, gl.FLOAT, pixelbuffer);

        

        for (let y = 0; y < s; y++) {
          for (let x = 0; x < s; x++) {

            const uv = new Vector([
              (2 * x + 1 - s) / s,
              (2 * y + 1 - s) / s,
              0
            ]);
            const ro = projection.mul(uv);

            for (const i of [0, 2]) {
              const a = pixelbuffer[idx + i];
              const imag = pixelbuffer[idx + i + 1];
              if (!Number.isFinite(a) || !Number.isFinite(imag)||imag>0.01) continue;
              const pt = ro.add(axis.mul(a));
              points.push(pt.array);
            }
          }
        }
      }
    }


    
    gl.bindVertexArray(null);
    gl.bindFramebuffer(gl.FRAMEBUFFER, null);

    gl.bindBuffer(gl.ARRAY_BUFFER, this.pointbuffer);
    this.count=points.length;
    gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(points.flat()), gl.STATIC_DRAW);


  }

  render(ctx) {
    const gl = this.gl;
    gl.depthFunc(gl.LESS);
    gl.enable(gl.DEPTH_TEST);
    pointcloudrenderer.pointshader.use();
    gl.uniform4fv(pointcloudrenderer.pointshader.getUniformLocation('incolor'), [this.color.r,this.color.g,this.color.b,1.0]);
    ctx.updateUniforms(pointcloudrenderer.pointshader); // sets cameraPos and cameraMatrix and windowsize
    gl.bindVertexArray(this.pointvao);
    gl.drawArrays(gl.POINTS, 0, this.count);
    gl.bindVertexArray(null);
  }



  static createRootOutputTextures(gl, width, height) {
    const textures = [];
    const attachments = [
      gl.COLOR_ATTACHMENT0,
      gl.COLOR_ATTACHMENT1,
      gl.COLOR_ATTACHMENT2,
      gl.COLOR_ATTACHMENT3
    ];
    const framebuffer = gl.createFramebuffer();
    gl.bindFramebuffer(gl.FRAMEBUFFER, framebuffer);

    for (const attachment of attachments) {
      const tex = gl.createTexture();
      gl.bindTexture(gl.TEXTURE_2D, tex);
      gl.texImage2D(
        gl.TEXTURE_2D, 0, gl.RGBA32F,//gl.RGBA16F,
        width, height, 0,
        gl.RGBA, gl.FLOAT, null
      );
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.NEAREST);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.NEAREST);
      gl.framebufferTexture2D(
        gl.FRAMEBUFFER, attachment, gl.TEXTURE_2D, tex, 0
      );
      textures.push(tex);
    }

    const status = gl.checkFramebufferStatus(gl.FRAMEBUFFER);
    if (status !== gl.FRAMEBUFFER_COMPLETE) {
      console.error("Framebuffer incomplete:", status);
    }

    return [textures,framebuffer];
  }

   isTilable(){return false;}

}

      gl.COLOR_ATTACHMENT1,
      gl.COLOR_ATTACHMENT2,
      gl.COLOR_ATTACHMENT3
    ];
    const framebuffer = gl.createFramebuffer();
    gl.bindFramebuffer(gl.FRAMEBUFFER, framebuffer);

    for (const attachment of attachments) {
      const tex = gl.createTexture();
      gl.bindTexture(gl.TEXTURE_2D, tex);
      gl.texImage2D(
        gl.TEXTURE_2D, 0, gl.RGBA32F,//gl.RGBA16F,
        width, height, 0,
        gl.RGBA, gl.FLOAT, null
      );

      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.NEAREST);
      gl.framebufferTexture2D(
        gl.FRAMEBUFFER, attachment, gl.TEXTURE_2D, tex, 0
      );
      textures.push(tex);
    }

    const status = gl.checkFramebufferStatus(gl.FRAMEBUFFER);
    if (status !== gl.FRAMEBUFFER_COMPLETE) {
      console.error("Framebuffer incomplete:", status);
    }

    return [textures,framebuffer];
  }

class MultiResBuffer{
  constructor(ctx){
    this.ctx=ctx;
    this.inithigh(736,350);
    this.initlow(100,100);
    this.initupscaleshader();
  }

  

  initupscaleshader(){
    const gl=this.ctx.gl;

    const upscalefrag=`#version 300 es
    precision highp float;

    in vec2 v_uv;
    out vec4 fragColor;

    uniform sampler2D u_color;
    uniform sampler2D u_depth;

    void main() {
      // Sample color and depth from low-res textures
      fragColor = texture(u_color, v_uv);

      float depth = texture(u_depth, v_uv).r;
      gl_FragDepth = depth; // Pass depth manually
    }`;
    this.upscaleshader=new Shader(gl,raycastingVertexShaderSource,upscalefrag);
  }



  render_low() {
   /** @type{RenderContext} */
    const ctx = this.ctx;
    const gl = ctx.gl;

    // 1) Blit high-res framebuffer color to default framebuffer (canvas)
    gl.bindFramebuffer(gl.READ_FRAMEBUFFER, this.high_framebuffer);
    gl.bindFramebuffer(gl.DRAW_FRAMEBUFFER, null); // default framebuffer

    const [width,height] = ctx.resolution;
    {const err = gl.getError();
    if (err !== gl.NO_ERROR) {
      console.warn("Rendering error:", err);
    }}

    // Blit color and buffer
    gl.blitFramebuffer(
      0, 0, 1000, 1000,       // src rect
      0, 0, width, height,       // dst rect
      gl.COLOR_BUFFER_BIT,       // mask
      gl.NEAREST                 // filter
    );
    {const err = gl.getError();
    if (err !== gl.NO_ERROR) {
      console.warn("Rendering error:", err);
    }}
    gl.blitFramebuffer(
      0, 0, 1000, 1000,       // src rect
      0, 0, width, height,       // dst rect
      gl.DEPTH_BUFFER_BIT,       // mask
      gl.NEAREST                 // filter
    );
     {const err = gl.getError();
    if (err !== gl.NO_ERROR) {
      console.warn("Rendering error:", err);
    }}


    // Unbind framebuffers after blit
    gl.bindFramebuffer(gl.READ_FRAMEBUFFER, null);
    gl.bindFramebuffer(gl.DRAW_FRAMEBUFFER, null);

    // 2) Now upscale low-res texture over the default framebuffer
    gl.depthFunc(gl.LESS);
    gl.enable(gl.DEPTH_TEST);
    
    this.upscaleshader.use();

    // Bind low-res color texture to texture unit 0
    gl.activeTexture(gl.TEXTURE0);
    gl.bindTexture(gl.TEXTURE_2D, this.low_texture_color);
    this.upscaleshader.uniform1i("u_color", 0);

    // Bind low-res depth texture to texture unit 1
    gl.activeTexture(gl.TEXTURE1);
    gl.bindTexture(gl.TEXTURE_2D, this.low_texture_depth);
    //gl.uniform1i(this.upscaleshader.getUniformLocation("u_depth"), 1);
    this.upscaleshader.uniform1i("u_depth", 1);

    // Draw fullscreen triangle or quad (depending on your setup)
    ctx.bindquadvao();
    gl.drawArrays(gl.TRIANGLES, 0, 3);

    // Cleanup bindings (optional)
    gl.bindTexture(gl.TEXTURE_2D, null);
    gl.useProgram(null);


    {const err = gl.getError();
    if (err !== gl.NO_ERROR) {
      console.warn("Rendering error:", err);
    }}
  }
  clear(){
    const gl=this.ctx.gl;
    for(const fb of [this.high_framebuffer,this.low_framebuffer,null]){
      gl.bindFramebuffer(gl.FRAMEBUFFER,fb);
      gl.clearColor(0.0, 0.0, 0.0, 1.0);
      gl.clear(gl.COLOR_BUFFER_BIT | gl.DEPTH_BUFFER_BIT);
    }
  }


  inithigh(width, height){
    const ctx = this.ctx;
    const gl=ctx.gl;


    this.high_framebuffer=gl.createFramebuffer();
    gl.bindFramebuffer(gl.FRAMEBUFFER, this.high_framebuffer);

    this.high_renderbuffer_color=gl.createRenderbuffer();
    gl.bindRenderbuffer(gl.RENDERBUFFER,this.high_renderbuffer_color);
    //gl.renderbufferStorage(gl.RENDERBUFFER, gl.RGBA8, width, height);//or RGB8
    gl.framebufferRenderbuffer(gl.FRAMEBUFFER,gl.COLOR_ATTACHMENT0,gl.RENDERBUFFER,this.high_renderbuffer_color);

    this.high_renderbuffer_depth=gl.createRenderbuffer();
    gl.bindRenderbuffer(gl.RENDERBUFFER,this.high_renderbuffer_depth);
    //gl.renderbufferStorage(gl.RENDERBUFFER, gl.DEPTH_COMPONENT16, width, height);//or gl.DEPTH_COMPONENT24 or gl.DEPTH_COMPONENT32F
    gl.framebufferRenderbuffer(gl.FRAMEBUFFER,gl.DEPTH_ATTACHMENT,gl.RENDERBUFFER,this.high_renderbuffer_depth);
    

    this.resizehigh(width, height);

    {const status = gl.checkFramebufferStatus(gl.FRAMEBUFFER);
    if (status !== gl.FRAMEBUFFER_COMPLETE) {
      console.error("Framebuffer incomplete:", status);
    }}
  }

  initlow(width, height){
    const ctx = this.ctx;
    const gl=ctx.gl;


    this.low_framebuffer=gl.createFramebuffer();
    gl.bindFramebuffer(gl.FRAMEBUFFER, this.low_framebuffer);

    this.low_texture_color=gl.createTexture();
    gl.bindTexture(gl.TEXTURE_2D, this.low_texture_color);
    /*gl.texImage2D(
      gl.TEXTURE_2D, 0, gl.RGBA8,
      width, height, 0,
      gl.RGBA, gl.UNSIGNED_BYTE, null
    );*/
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.NEAREST);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.NEAREST);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
    gl.framebufferTexture2D(
      gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, this.low_texture_color, 0
    );

    this.low_texture_depth=gl.createTexture();
    gl.bindTexture(gl.TEXTURE_2D, this.low_texture_depth);
    /*gl.texImage2D(
      gl.TEXTURE_2D, 0, gl.DEPTH_COMPONENT16,
      width, height, 0,
      gl.RGBA, gl.UNSIGNED_SHORT, null
    );*/
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.NEAREST);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.NEAREST);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
    gl.framebufferTexture2D(
      gl.FRAMEBUFFER, gl.DEPTH_ATTACHMENT, gl.TEXTURE_2D, this.low_texture_depth, 0
    );
    

    this.resizelow(width, height);

    {const status = gl.checkFramebufferStatus(gl.FRAMEBUFFER);
    if (status !== gl.FRAMEBUFFER_COMPLETE) {
      console.error("Framebuffer incomplete:", status);
    }}

    gl.bindFramebuffer(gl.FRAMEBUFFER, null);
  }

  resizehigh(width, height){
    const gl = this.ctx.gl;
    gl.bindRenderbuffer(gl.RENDERBUFFER,this.high_renderbuffer_color);
    gl.renderbufferStorage(gl.RENDERBUFFER, gl.RGBA8, width, height);//or RGB8

    gl.bindRenderbuffer(gl.RENDERBUFFER,this.high_renderbuffer_depth);
    gl.renderbufferStorage(gl.RENDERBUFFER, gl.DEPTH_COMPONENT16, width, height);
  }

  resizelow(width, height){
    const gl = this.ctx.gl;
    gl.bindTexture(gl.TEXTURE_2D, this.low_texture_color);
    gl.texImage2D(
      gl.TEXTURE_2D, 0, gl.RGBA8,
      width, height, 0,
      gl.RGBA, gl.UNSIGNED_BYTE, null
    );

    gl.bindTexture(gl.TEXTURE_2D, this.low_texture_depth);
    gl.texImage2D(
      gl.TEXTURE_2D, 0, gl.DEPTH_COMPONENT16,
      width, height, 0,
      gl.DEPTH_COMPONENT, gl.UNSIGNED_SHORT, null
    );
  }

  destroy() {
    const gl = this.ctx.gl;
    gl.deleteFramebuffer(this.high_framebuffer);
    gl.deleteRenderbuffer(this.high_renderbuffer_color);
    gl.deleteRenderbuffer(this.high_renderbuffer_depth);

    gl.deleteFramebuffer(this.low_framebuffer);
    gl.deleteTexture(this.low_texture_color);
    gl.deleteTexture(this.low_texture_depth);
  }




}

      if (object.isTilable()) {

class MultiResCanvas extends MultiresBase{
  constructor(ctx){
    super();
    this.ctx=ctx;


    this.highResolutionScale = 0.3;
    this.lowResolutionScale = 0.2;
    this.stillTime = performance.now();
    this.setScale(this.lowResolutionScale);//sets scale
  }

  resize(){
    this.setScale();
  }

  target(){
    this.ctx.updateViewport();
    const gl=this.ctx.gl;
    gl.bindFramebuffer(gl.FRAMEBUFFER,null);
  }

  update(){
    const now = performance.now();
    const moving = this.ctx.moved;

    if(this.highResolutionScale==this.lowResolutionScale){
        //pass 
    }else if (moving) {
      this.stillTime = now;
      if (!this.isLowRes) {
        this.setScale(this.lowResolutionScale);
        //console.log("set to low res");
        this.ctx.requestRender();
      };
      
    }else if (this.isLowRes && (now - this.stillTime > 500)) {//not moving for 0.5 sec
      this.setScale(this.highResolutionScale);
        //console.log("set to high res");

      this.ctx.requestRender();
    }
  }

  
  get isLowRes(){return this.scale<this.highResolutionScale;}


  setScale(scale=undefined) {
    if(scale)this.scale=scale;
    const canvas=this.ctx.canvas;
    const dpr = window.devicePixelRatio || 1;
    const width = Math.floor(canvas.clientWidth * dpr * this.scale);
    const height = Math.floor(canvas.clientHeight * dpr * this.scale);
    canvas.width = width;
    canvas.height = height;
  }



  render() {
        const gl=this.ctx.gl;

    gl.bindFramebuffer(gl.FRAMEBUFFER,null);
    gl.clearColor(0.0, 0.0, 0.0, 1.0);
    gl.clear(gl.COLOR_BUFFER_BIT | gl.DEPTH_BUFFER_BIT);

      object.render(this.ctx);
    }


    gl.bindFramebuffer(gl.FRAMEBUFFER, null);
    this.ctx.updateViewport();

    //gl.finish();
  }
  clear(){

    gl.bindFramebuffer(gl.FRAMEBUFFER,null);
    gl.clearColor(0.0, 0.0, 0.0, 1.0);
    //gl.clearDepth(1.0);
    gl.clear(gl.COLOR_BUFFER_BIT | gl.DEPTH_BUFFER_BIT);
  }

  voxelEdgeLength(level) {
    // Total divisions along one axis at max level is 2^10 (1024)
    // At level 0: 1 voxel spans the entire [-1,1] range → length = 2.0
    // Each level subdivides by factor of 2, so edge length halves each level
    // So edge length = 2.0 / 2^level

    return 2.0 / (1 << level);
  }



  packVoxel(x, y, z) {
    if(x>0x3FF || y>0x3FF || z>0x3FF)throw new Error("coord out of bounds");
    return ( (z & 0x3FF) << 20 ) | ( (y & 0x3FF) << 10 ) | (x & 0x3FF);
  }
  unpackVoxel(packed) {
    // packed is an int 
    // We use >>> 0 to treat as unsigned 32-bit integer
    const u = packed >>> 0;//not actually needed
    //const u=packed;
    const x = u & 0x3FF;           // lower 10 bits
    const y = (u >>> 10) & 0x3FF;  // next 10 bits
    const z = (u >>> 20) & 0x3FF;  // next 10 bits
    return [x,y,z];
  }

  voxelToPosition(voxelCoords) {
    // voxelCoords: [x, y, z], each in [0..1023]

    return voxelCoords.map(c => this.scale*((c) * (2.0 / 1024.0) - 1.0));
  }

  /**
   * Given an array of packed voxels and current subdivision level,
   * returns a flat array of their 8 child voxels each.
   * 
   * @param {number[]} parentVoxels - array of packed voxels (ints)
   * @param {number} currentLevel - subdivision level (0 to 9)
   * @returns {number[]} Array of packed child voxels
  */
  subdivideVoxels(parentVoxels, currentLevel) {
    const step = 1 << (10 - currentLevel - 1);
    //const dx = step;
    //const dy = step << 10;
    //const dz = step << 20;
    const dx = this.packVoxel(step, 0, 0);
    const dy = this.packVoxel(0, step, 0);
    const dz = this.packVoxel(0, 0, step);
    //console.log(dx,this.unpackVoxel(dx),currentLevel);
    if(currentLevel==10){
      throw new Error("level to high");
    }

    return parentVoxels.flatMap(packedVoxel => [
      packedVoxel,
      packedVoxel + dx,
      packedVoxel + dy,
      packedVoxel + dz,
      packedVoxel + dx + dy,
      packedVoxel + dx + dz,
      packedVoxel + dy + dz,
      packedVoxel + dx + dy + dz,
    ]);
  }

  isTilable(){return false;}
}

    const nodecache= visitnodes(this.visgraph.outputnodes,(node,parentresults)=>{
      if(node.operand instanceof VarOperand) {
          return Poly.var(node.operand.name);
          /*if(nametovar.has(node.operand.name)){

              //console.log("missing variable "+node.operand.name);
              //return new Multidual(0,0,0,0,0,0,0);
              throw new Error("missing variable "+node.operand.name);
          }*/
      }
      if(node.operand instanceof AddOperand){
          return parentresults.reduce((prev,cur)=>prev.add(cur));
      }
      if(node.operand instanceof MulOperand){
          return parentresults.reduce((prev,cur)=>prev.mul(cur));
      }
      if(node.operand instanceof NegOperand){
          return parentresults[0].mul(-1);
      }
      if(node.operand instanceof ConstOperand){
          return Poly.convert(node.operand.value);
      }
      if(node.operand instanceof DivOperand){
        //console.log("div "+parentresults[0]);
          return parentresults[0].div(parentresults[1]);//only maximal degree
      }
      throw new Error("bad operation :"+node.operand.constructor.name);
    });

    const xyzstrings=new Set(["_V_X","_V_Y","_V_Z"]);

    const outputpolyspervarperrow=outputpolys.map((poly)=>{
      // sorts monoms per variable  a*x+a*y+b*z->a:x+y,b:z
      const polymap=new Map();
      for(let [monom, value] of poly.entries()){
        /**@type {String[]} */
        const variables=Object.keys(monom).filter(v => !xyzstrings.has(v));

        polymap.get(varname).coeffs.set(Poly.monomialToKey(monom),value);//add monom to poly
      }

      //basis switch
      /**@type {Map<string,number[]>} */
      const outputrowspervar=new Map(
        polymap.entries().map(
          ([varname,poly])=>[varname,basisconverter.convert(poly)]
        )
      );
      return outputrowspervar;
      
      
    });

function addPipelineSelectorForObject(renderableObject, container) {
  const wrapper = document.createElement('div');
  wrapper.classList.add('object-visualization-mode');

  // Label
  const label = document.createElement('label');
  label.textContent = renderableObject.name;
  wrapper.appendChild(label);

  // Selector
  const select = document.createElement('select');
  for (const methodName of renderableObject.pipelines.keys()) {
    const option = document.createElement('option');
    option.value = methodName;
    option.textContent = methodName;
    select.appendChild(option);
  }
  {
  const option = document.createElement('option');
  option.value = "";
  option.textContent = "no_visualization";
  select.appendChild(option);
  }

  // Set initial selection
  select.value ="aberth";// renderableObject.activePipelineName ?? [...renderableObject.pipelines.keys()][0];

  // On change: update active pipeline + call ctx
  select.onchange = () => {
    renderableObject.setActivePipeline(select.value);
  };

  wrapper.appendChild(select);
  container.appendChild(wrapper);

  // Immediately set the pipeline on first insert if none is active
  if (renderableObject.activePipelineName === null) {
    renderableObject.setActivePipeline(select.value);
  }
}
