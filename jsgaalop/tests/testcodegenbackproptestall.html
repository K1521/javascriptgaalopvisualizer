/**
 * python style range but returns a list instead of iterator
*/
function range(start,stop,step=1){
  if(stop==undefined){
    stop=start;
    start=0;
  }
  if (step === 0) throw new Error("step cannot be 0");
  const length=Math.ceil((stop-start)/step);
  return Array.from({length},(_,i)=>start+step*i);
}

function zip(...arrs){
  return range(
    Math.min(...arrs.map(arr=>arr.length))
  ).map(i=>arrs.map(arr=>arr[i])); 
}

function setsEqual(a, b) {
  if(!(a instanceof Set))a=new Set(a);
  if(!(b instanceof Set))b=new Set(b);
  if (a.size !== b.size) return false;
  for (const v of a) {
    if (!b.has(v)) return false;
  }
  return true;
}

function relErr(a, b, eps = 1e-12) {
  return Math.abs(a - b) / Math.max(Math.abs(a), Math.abs(b), eps);
}
/**
 * Compute the maximum relative error in a list of numbers.
 * Works for any values, including mixed signs.
 *
 * @param {number[]} L - List of numbers
 * @param {number} eps - Small epsilon to avoid division by zero (default 1e-12)
 * @returns {number} Maximum relative error
 */
function maxRelErr(L, eps = 1e-12) {
  if (L.length < 2) return 0;

  const m = Math.min(...L);
  const M = Math.max(...L);

  let maxErr = 0;

  for (const x of L) {
    const relMin = Math.abs(x - m) / Math.max(Math.abs(x), Math.abs(m), eps);
    const relMax = Math.abs(x - M) / Math.max(Math.abs(x), Math.abs(M), eps);
    maxErr = Math.max(maxErr, relMin, relMax);
  }

  return maxErr;
}
function maxRelErrAprox(L, eps = 1e-12) {
  if (L.length < 2) return 0;
  const m = Math.min(...L);
  const M = Math.max(...L);
  return (M-m) / Math.max(Math.abs(m), Math.abs(m), eps)
}
function maxBy(arr, key) {
  if (arr.length === 0) return undefined;
  let best = arr[0];
  let bestScore = key(best, 0);

  for (let i = 1; i < arr.length; i++) {
    const score = key(arr[i], i);
    if (score > bestScore) {
      bestScore = score;
      best = arr[i];
    }
  }
  return best;
}
function minBy(arr, key) {
  if (arr.length === 0) return undefined;
  let best = arr[0];
  let bestScore = key(best, 0);

  for (let i = 1; i < arr.length; i++) {
    const score = key(arr[i], i);
    if (score > bestScore) {
      bestScore = score;
      best = arr[i];
    }
  }
  return best;
}

function stats(arr) {
  const n = arr.length;
  const sorted = [...arr].sort((a, b) => a - b);
  const min = sorted[0];
  const max = sorted[n - 1];
  const mean = arr.reduce((a, b) => a + b, 0) / n;
  const std = Math.sqrt(arr.reduce((s, x) => s + (x - mean) ** 2, 0) / n);
  const median = n % 2 ? sorted[(n - 1) / 2] : (sorted[n / 2 - 1] + sorted[n / 2]) / 2;
  return { n, min, max, mean, median, std };
}
