import * as mathjs from 'https://cdn.jsdelivr.net/npm/mathjs@14.5.2/+esm';

import { shaderSources,loadWithIncludes } from "../src/glwrapper/shaderimporter.js";

const importedFns={
  mathjs,
  TransformFeedbackWrapper,
  shaderSources,loadWithIncludes,
  Shader
}
function range(start,stop,step=1){
  if(stop==undefined){
    stop=start;
    start=0;
  }
  if (step === 0) throw new Error("step cannot be 0");
  const length=Math.ceil((stop-start)/step);
  return Array.from({length},(_,i)=>start+step*i);
}

function zip(...arrs){
  return range(
    Math.min(...arrs.map(arr=>arr.length))
  ).map(i=>arrs.map(arr=>arr[i])); 
}

function resizePlots() {window.dispatchEvent(new Event('resize'));}
Split(['#editor', '#right'], {minSize: 100,onDragEnd: resizePlots});
//Split(['#historyEl', '#consoleEl','#customEl'], {minSize: 0,direction: 'vertical'})
Split(['#historyPanel', '#consolePanel','#customPanel'], {minSize: 0,direction: 'vertical',onDragEnd: resizePlots});
CodeMirror.defineMode("jswithglsl", function (config) {
  return CodeMirror.multiplexingMode(
    CodeMirror.getMode(config, "javascript"),
    {
      open: "`",
      close: "`",
      mode: CodeMirror.getMode(config, "text/x-csrc"),
      delimStyle: "delimit"
    }
  );
});
const editor = CodeMirror(document.getElementById("editor"), {
  value: `
appendLog("hello");
appendResult("world");
`,
  mode: "jswithglsl",
  theme: "monokai",
  lineNumbers: true
});

// Access editor content like this:
editor.on("change", () => {
  const code = editor.getValue();
  //console.log("Editor changed:", code);
});

const consoleEl = document.getElementById("consoleEl");
const gl = document.getElementById('myCanvas').getContext('webgl2',{preserveDrawingBuffer: true,antialias: false});


function appendLog(...args) {
    consoleEl.textContent += args.join(' ') + '\n';
    consoleEl.scrollTop = consoleEl.scrollHeight; // auto-scroll
}


function clearLog() {
    consoleEl.textContent = "";
}

function setCustom(content=null) {
  const container = document.getElementById('customEl');

  // Clear previous content
  container.innerHTML = '';
  if(content==null){

  } else if (typeof content === 'string') {
    // If content is a string, insert as HTML
    container.innerHTML = content;
  } else {
    // If content is an element, append it
    container.appendChild(content);
  }
}




document.getElementById("runTest").addEventListener("click", () => {
    const code = editor.getValue();
    let result = "";

    function appendResult(...args) {
        result += args.join(" ") + "\n";
    }

    clearLog();
    appendLog("// Running...");
    setCustom();

    function runUserCode(code) {
      const internalFns = {
      appendLog,
      appendResult,
      setCustom,
      gl,
      startLoop,
      range
    };

      const fn = new Function(
        ...Object.keys(importedFns),
        ...Object.keys(internalFns),
        code
      );

      return fn(...Object.values(importedFns),...Object.values(internalFns));
    }



    try {
        const evaluated = runUserCode(code);

        if (typeof evaluated === "function" &&
            evaluated.constructor.name === "GeneratorFunction") {

            appendLog("// Generator started");

            startLoop(evaluated, {
                onDone: ({ finished, stopped, error } = {}) => {

                    if (error) {
                        appendLog("[ERROR inside generator]");
                        appendLog(error);
                        appendLog(error.stack);
                    }

                    if (finished) appendLog("// Finished");
                    if (stopped) appendLog("// Stopped");

                    appendLog("// Result");
                    appendLog(result);

                    if (result)
                        appendHistory(result, code, consoleEl.textContent);
                }
            });

        } else {
            appendLog("// Done (sync)");
            appendLog("// Result");
            appendLog(result);

            if (result)
                appendHistory(result, code, consoleEl.textContent);
        }

    } catch (e) {
        appendLog("[ERROR during eval]");
        appendLog(e);
        appendLog(e.stack);
        appendLog("// Done with Error");
    }
});

function appendHistory(result, code, output) {
  const template = document.getElementById("result-template");
  const clone = template.content.cloneNode(true);
  const block = clone.querySelector(".result-block");

  const header = block.querySelector(".result-header");
  const title = block.querySelector(".result-title");
  const content = block.querySelector(".result-content");

  // one-line summary (first line, trimmed)
  title.textContent = result.split('\n')[0].slice(0, 120);

  // full content
  content.textContent = result;

  // toggle collapse
  header.addEventListener("click", (e) => {
    if (e.target.tagName === "BUTTON") return; // don't toggle when clicking buttons
    if (content.style.display === "none") {
        content.style.display = "block";
        // scroll into view after expanding
        block.scrollIntoView({ behavior: "smooth", block: "end" });
    } else {
        content.style.display = "none";
    }
  });
  content.style.display = "none"; // collapsed by default

  block.querySelector(".restore").addEventListener("click", () => {
    editor.setValue(code);
    //const scrollInfo = editor.getScrollInfo();
    //editor.setValue(code);
    //editor.scrollTo(scrollInfo.left, scrollInfo.top);
    consoleEl.textContent = output;
  });

  block.querySelector(".delete").addEventListener("click", () => {
    block.remove();
  });

  const history = document.getElementById("historyEl");
  history.appendChild(clone);
  history.scrollTop = history.scrollHeight;
}



//jay chatgpt code
// --------------------
// Global run/version variable
// --------------------
let run = 0;

function startLoop(generatorFn, { onDone } = {}) {
    run++;
    const runLocal = run;

    let iterator;

    try {
        iterator = generatorFn();   // MUST be generator function
    } catch (err) {
        if (onDone) onDone({ error: err });
        return;
    }

    function loop() {
        if (runLocal !== run) {
            if (onDone) onDone({ stopped: true });
            return;
        }

        let res;
        try {
            res = iterator.next();
        } catch (err) {
            if (onDone) onDone({ error: err });
            return;
        }

        if (res.done) {
            if (onDone) onDone({ finished: true });
            return;
        }

        requestAnimationFrame(loop);
    }

    requestAnimationFrame(loop);
}

// --------------------
// Stop Button
// --------------------

document.getElementById("stopTest").addEventListener("click", () => {
    run++;  // increment run to stop any active loop
});
