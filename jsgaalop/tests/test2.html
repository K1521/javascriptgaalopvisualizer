<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <title>test</title>
    <!--<base href="/jsgaalop/">-->
</head>
<body>
    <canvas id="mainCanvas" tabindex="0" style="border-style: solid;"></canvas>
<script type="module">
import { GaalopGraph ,Bundlenode,VarNode,NodeTypes,AddNode,MulNode,visualizationtargetnode,LabelNode,FunctionbodyNode,ReturnNode} from "../src/core/codegenv3.js";

const mainCanvas = document.getElementById('mainCanvas');
//const diagramCanvas = document.getElementById('diagramCanvas');
/** @type{WebGL2RenderingContext}*/
const gl = mainCanvas.getContext('webgl2',{preserveDrawingBuffer: true,antialias: false});


async function load(url) {
  const response = await fetch(url);
  if (!response.ok) {
    console.error('Failed to load:', url);
    return '';
  }
  return await response.text();
}

let gajson=await load("../assets/torus_plane_intersect.json");
const gagraph=GaalopGraph.fromjson(gajson);
window.gagraph = gagraph;

const vistargets=new Bundlenode(gagraph.vistargets());
const vistargetsoptimized=new Bundlenode(gagraph.getoptimizedvistargets());

const viscopy=vistargetsoptimized.copyGraph();
const r=viscopy.parents[0].generatefunctionbodys();
console.log(r);

import { TransformFeedbackWrapper } from "../src/glwrapper/TransformFeedbackWrapper.js";
import { shaderSources,loadWithIncludes } from "../src/glwrapper/shaderimporter.js";
import { Shader } from "../src/glwrapper/glwrapper.js";

async function loadshaderdource(generator,template){
    return generator(await loadWithIncludes("../src/shadersource/shaderlibv1/",template))
    .replace("Intervall IntervallSummofsquares(Intervall _V_X,Intervall _V_Y,Intervall _V_Z) {?}","")
    .replace("bool evaluatevoxelIntervall3d(Intervall x, Intervall y, Intervall z) {?}","");
}

const gen=viscopy.parents[0].makecodegenerator();

let vertexshader;
vertexshader=await loadshaderdource(gen,
`
#version 300 es
precision mediump float;

//#include "../common/utilfrag.glsl"
//#include "../common/util.glsl"
#include "./common/generated_functions.glsl"


in vec3 position;
out vec4 result;

void main(){
    result=xyzDualSummofsquares(position);
}
`);
let transformfeedback=new TransformFeedbackWrapper(gl, vertexshader, ["result"]);

console.log(transformfeedback.shader.getAttribLocation("position"));
const data = Array.from({ length: 1000*3 }, () => Math.random());;

console.log(gl);
const vao=gl.createVertexArray();
gl.bindVertexArray(vao);
const buffer=gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER,buffer);
gl.bufferData(gl.ARRAY_BUFFER,new Float32Array(data),gl.DYNAMIC_DRAW);
gl.enableVertexAttribArray(0);
gl.vertexAttribPointer(0,3,gl.FLOAT,false,0,0);




console.log(transformfeedback.run(1000));

</script>     
</body>
</html>
