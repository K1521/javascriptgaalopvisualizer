const vsSource = `#version 300 es
precision highp float;

uniform vec2 focal;

out vec2 v_screen;
out vec2 v_rayDirXY; // not normalized
out vec2 v_uv;

  void main(void) {
    vec2 pos[3] = vec2[](
      vec2(-1.0, -1.0),
      vec2(3.0, -1.0),
      vec2(-1.0, 3.0)
    );


    vec2 screen = pos[gl_VertexID]; //screen cords [-1,1]

    v_uv=(screen+1.)*0.5;
    v_screen=screen;
    gl_Position = vec4(screen,0.,1.);
    v_rayDirXY = screen / focal;
  }
`;

const fsSource = `#version 300 es
precision mediump float;
in vec2 v_uv;
out vec4 fragColor;

void main() {
  // Original checkerboard pattern
  float pattern = 0.5 + 0.5 * mod(floor(v_uv.x * 4.0) + floor(v_uv.y * 4.0), 2.0);
  vec3 col = vec3(1.0) * pattern;

  // Waste time with a heavy loop
  float sum = 0.0;
  for (int i = 0; i < 1000; i++) {
    float f = float(i);
    sum += sin(f + v_uv.x * 100.0) * cos(f + v_uv.y * 100.0);
  }

  // Use sum to affect output color so compiler doesn't optimize it out
  col *= 0.5 + 0.5 * sin(sum * 0.00001);

  fragColor = vec4(col, 1.0);
}
`;

function compile(gl, type, src) {
  const shader = gl.createShader(type);
  gl.shaderSource(shader, src);
  gl.compileShader(shader);
  if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
    throw gl.getShaderInfoLog(shader);
  }
  return shader;
}

const vertexShader = compile(gl, gl.VERTEX_SHADER, vsSource);
const fragmentShader = compile(gl, gl.FRAGMENT_SHADER, fsSource);

const program = gl.createProgram();
gl.attachShader(program, vertexShader);
gl.attachShader(program, fragmentShader);
gl.linkProgram(program);
gl.useProgram(program);

const posLoc = gl.getAttribLocation(program, "aPosition");

function generatePoints(n) {
  const arr = new Float32Array(n * 3);
  for (let i = 0; i < n; i++) {
    arr[3 * i] = Math.random() * 2 - 1;
    arr[3 * i + 1] = (Math.random() * 2 - 1);
    arr[3 * i + 2] = 1;
  }
  return arr;
}

let N = 10_000_000;
let points = generatePoints(N);

const buffer = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buffer);
gl.bufferData(gl.ARRAY_BUFFER, points, gl.STATIC_DRAW);
gl.enableVertexAttribArray(posLoc);
gl.vertexAttribPointer(posLoc, 3, gl.FLOAT, false, 0, 0);


function* percentGenerator() {
  while (true) {
    for (let i = 0; i <= 100; i++) {
      yield i / 100;
    }
  }

}

function* percentGeneratorShuffeled() {
  while (true) {
    // Create array [0, 1, 2, ..., 100]
    const indices = Array.from({ length: 1001 }, (_, i) => i);

    // Shuffle using Fisher–Yates
    for (let i = indices.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [indices[i], indices[j]] = [indices[j], indices[i]];
    }

    // Yield shuffled values scaled to [0, 1]
    for (const i of indices) {
      yield i / 1000;
    }
  }
}

function range(start, end, step = 1) {
  const length = Math.ceil((end - start) / step);
  return Array.from({ length }, (_, i) => start + i * step);
}



function* randchoiceloop(arr) {
  arr = [...arr];
  while (true) {
    // Create array [0, 1, 2, ..., 100]
    //const indices = Array.from({ length: n }, (_, i) => i);

    // Shuffle using Fisher–Yates
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }

    // Yield shuffled values scaled to [0, 1]
    for (const i of arr) {
      yield i;
    }
  }
}
let gen = randchoiceloop(range(1, 100));
function draw2() {

  let w;
  let h;


  /*
  const h1=Math.round(canvas.height*gen.next().value);

  const h2=Math.round(canvas.height*gen.next().value);
  const w2=Math.round(canvas.width*gen.next().value);

  h = canvas.height;

  //w=Math.round(canvas.width*gen.next().value);

  const t0 = performance.now();

  gl.enable(gl.SCISSOR_TEST);

  for (let x = 0; x < xTiles; x++) {
    const x0 = Math.floor(w * x / xTiles);

    gl.scissor(x0, 0, x1 - x0, h);

    //gl.drawArrays(gl.POINTS, 0, N / 10);
    gl.drawArrays(gl.TRIANGLES, 0, 3);
    //console.log([x0,0,x1-x0,h]);

  //document.title = `Rendering ${N.toLocaleString()} points @ ${fps} FPS`;
  xValues.push(xTiles);
  yValues.push((t1 - t0));
  Plotly.redraw('plotlyDiagram');
  requestAnimationFrame(draw2);
}
