<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Point Cloud Benchmark</title>
  <style>
    canvas { width: 100%; height: 100%; display: block; }
  </style>
</head>
<body>
<canvas id="glcanvas"></canvas>
<script>
const canvas = document.getElementById("glcanvas");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
const gl = canvas.getContext("webgl2");

const vsSource = `#version 300 es
in vec2 aPosition;
void main() {
  gl_PointSize = 5.0;
  gl_Position = vec4(aPosition, 0.0, 1.0);
}`;

const fsSource = `#version 300 es
precision mediump float;
out vec4 fragColor;
void main() {
  fragColor = vec4(1.0);
}`;

function compile(gl, type, src) {
  const shader = gl.createShader(type);
  gl.shaderSource(shader, src);
  gl.compileShader(shader);
  if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
    throw gl.getShaderInfoLog(shader);
  }
  return shader;
}

const vertexShader = compile(gl, gl.VERTEX_SHADER, vsSource);
const fragmentShader = compile(gl, gl.FRAGMENT_SHADER, fsSource);

const program = gl.createProgram();
gl.attachShader(program, vertexShader);
gl.attachShader(program, fragmentShader);
gl.linkProgram(program);
gl.useProgram(program);

const posLoc = gl.getAttribLocation(program, "aPosition");

function generatePoints(n) {
  const arr = new Float32Array(n * 2);
  for (let i = 0; i < n; i++) {
    arr[2 * i] = Math.random() * 2 - 1;
    arr[2 * i + 1] = Math.random() * 2 - 1;
  }
  return arr;
}

let N = 10_000_000;
let points = generatePoints(N);

const buffer = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buffer);
gl.bufferData(gl.ARRAY_BUFFER, points, gl.STATIC_DRAW);
gl.enableVertexAttribArray(posLoc);
gl.vertexAttribPointer(posLoc, 2, gl.FLOAT, false, 0, 0);

function draw() {
  const t0 = performance.now();

  gl.clearColor(0, 0, 0, 1);
  gl.clear(gl.COLOR_BUFFER_BIT);
  gl.drawArrays(gl.POINTS, 0, N);

  // Wait for GPU to finish
  gl.finish();

  const t1 = performance.now();
  const fps = (1000 / (t1 - t0)).toFixed(1);
  document.title = `Rendering ${N.toLocaleString()} points @ ${fps} FPS`;
  requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
