<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Standalone Slider</title>
    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
            background: #fafafa;
        }

        .slideritem {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #f0f0f0;
            padding: 10px;
            border-radius: 6px;
            max-width: 500px;
        }

        .slideritem label {
            min-width: 50px;
            font-weight: bold;
        }

        .slideritem .slider {
            flex: 1;
        }

        .slideritem .value {
            width: 50px;
            text-align: right;
            font-family: monospace;
        }

        .slideritem.dragging{
            opacity: 0.1;
        }
    </style>
</head>

<body>

    <!--<div class="slideritem">
        <label for="slider1">a3:</label>

        <span class="value" id="value1">0.50</span>
    </div>-->
    <div id="sliderPanel">
        <template id="sliderTemplate">
            <div class="slideritem" draggable="true">
                <label>placeholderlabel</label>
                <input type="range" class="slider" min="0" max="1" step="0.01" value="0.5">
                <span class="value">placeholdervalue</span>
            </div>
        </template>
    </div>
    <div id="sliderPanel2">

    </div>

    <script>
        const sliderPanel = document.getElementById("sliderPanel");
        const sliderinfos = [{ name: "a1", min: 0, max: 1, value: 1 }, { name: "a2", min: 0, max: 1, value: 0.5 }];
        
        for(let i=3;i<10;i++)sliderinfos.push({ name: "a"+i, min: 0, max: 1, value: 1 });
        createSliderPanel(sliderinfos,sliderPanel);

        const sliderPanel2 = document.getElementById("sliderPanel2");
        const sliderinfos2 = [];
        
        for(let i=3;i<10;i++)sliderinfos2.push({ name: "b"+i, min: 0, max: 1, value: 1 });
        createSliderPanel(sliderinfos2,sliderPanel2);


        function createSliderPanel(sliderinfos,sliderPanel){
        const sliders=sliderinfos.map(createSliderHTML);
        sliders.forEach((s)=>{
            sliderPanel.appendChild(s);
            s.addEventListener("dragstart",()=>{
                setTimeout(()=>s.classList.add("dragging"),0);
            });
            s.addEventListener("dragend",()=>s.classList.remove("dragging"));
        });
        sliderPanel.addEventListener("dragover",(e)=>{
            e.preventDefault();


            


            //const otheritems2= [...sliderPanel.children].filter(child => child.classList.contains("slideritem") );
            const movingelement=sliderPanel.querySelector(".slideritem.dragging");
            if(!movingelement)return;
            /*const otheritems=[...sliderPanel.querySelectorAll(".slideritem:not(.dragging)")];
            //console.log(otheritems,otheritems2)
            const prev=otheritems.find((s)=>{
                const bound=s.getBoundingClientRect();
                return e.clientY<=bound.top+bound.height/2;
            });*/

            
            for(const prev of sliderPanel.querySelectorAll(".slideritem:not(.dragging)")){
                const bound=prev.getBoundingClientRect();
                if(e.clientY<=bound.top+bound.height/2){
                    sliderPanel.insertBefore(movingelement,prev);
                    return;
                }
            }
            //sliderPanel.insertBefore(movingelement,null);
            sliderPanel.appendChild(movingelement);
            
            
            //console.log(prev?.querySelector("label").textContent);
            //todo get last if prev is undefined
            //if(!prev)return;
            //sliderPanel.insertBefore(movingelement,prev);
            //prev.style.outline = "2px solid red";
            //console.log(e.offsetY);
            //console.log(e);
        });
    }

      
        



        function createSliderHTML({ name, min, max, value }) {
            const template = document.createElement("template");
            template.innerHTML = `
    <div class="slideritem" draggable="true">
      <label>${name}:</label>
      <input type="range" class="slider" min="${min}" max="${max}" step="0.01" value="${value}">
      <span class="value">${value.toFixed(2)}</span>
    </div>
  `.trim();

            const item = template.content.firstChild;

            const slider = item.querySelector(".slider");
            const valueSpan = item.querySelector(".value");

            slider.addEventListener("input", () => {
                valueSpan.textContent = Number(slider.value).toFixed(2);
            });

            return item;
        }


        function createSliderPanelTemplate(sliderinfos,sliderPanel){
            let template=sliderPanel.querySelector("template");;
            if(!template){
                template = document.createElement("template");
            template.innerHTML = `
    <div class="slideritem" draggable="true">
      <label>placeholder</label>
      <input type="range" class="slider" min="0" max="1" step="0.01" value="0">
      <span class="value">0</span>
    </div>
  `.trim();
  sliderPanel.appendChild(template);
}

        const sliders=sliderinfos.map(x=>createSliderHTMLTemplate(template,x));
        sliders.forEach((s)=>{
            sliderPanel.appendChild(s);
            s.addEventListener("dragstart",()=>{
                setTimeout(()=>s.classList.add("dragging"),0);
            });
            s.addEventListener("dragend",()=>s.classList.remove("dragging"));
        });
        sliderPanel.addEventListener("dragover",(e)=>{
            e.preventDefault();


            


            //const otheritems2= [...sliderPanel.children].filter(child => child.classList.contains("slideritem") );
            const movingelement=sliderPanel.querySelector(".slideritem.dragging");
            if(!movingelement)return;
            /*const otheritems=[...sliderPanel.querySelectorAll(".slideritem:not(.dragging)")];
            //console.log(otheritems,otheritems2)
            const prev=otheritems.find((s)=>{
                const bound=s.getBoundingClientRect();
                return e.clientY<=bound.top+bound.height/2;
            });*/

            
            for(const prev of sliderPanel.querySelectorAll(".slideritem:not(.dragging)")){
                const bound=prev.getBoundingClientRect();
                if(e.clientY<=bound.top+bound.height/2){
                    sliderPanel.insertBefore(movingelement,prev);
                    return;
                }
            }
            
            
            //console.log(prev?.querySelector("label").textContent);
            //todo get last if prev is undefined
            //if(!prev)return;
            //sliderPanel.insertBefore(movingelement,prev);
            //prev.style.outline = "2px solid red";
            //console.log(e.offsetY);
            //console.log(e);
        });
    }

      
        



        function createSliderHTMLTemplate(template,{ name, min, max, value,step }) {
            const item = template.content.cloneNode(true).firstElementChild;

            const label = item.querySelector("label");
            const slider = item.querySelector(".slider");
            const valueSpan = item.querySelector(".value");

            label.textContent = `${name}:`;
            slider.min = min??0;
            slider.max = max??1
            slider.step = step??0.01;
            slider.value = value??0;
            valueSpan.textContent = Number(slider.value).toFixed(2);

            slider.addEventListener("input", () => {
                valueSpan.textContent = Number(slider.value).toFixed(2);
            });

            return item;
        }



    </script>

</body>

</html>
