<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Standalone Slider</title>
    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
            background: #fafafa;
        }

        .slideritem {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #f0f0f0;
            padding: 10px;
            border-radius: 6px;
            max-width: 500px;
        }

        .slideritem label {
            min-width: 50px;
            font-weight: bold;
        }

        .slideritem .slider {
            flex: 1;
        }

        .slideritem .value {
            width: 50px;
            text-align: right;
            font-family: monospace;
        }

        .slideritem.dragging{
            opacity: 0.1;
        }
    </style>
</head>

<body>

    <div id="sliderPanel">
        <template id="sliderTemplate">
            <div class="slideritem" draggable="true">
                <label>placeholderlabel</label>
                <input type="range" class="slider" min="0" max="1" step="0.01" value="0.5">
                <span class="value">placeholdervalue</span>
            </div>
        </template>
    </div>

    <script>
        const sliderPanel = document.getElementById("sliderPanel");
        const sliderinfos = [{ name: "a1", min: 0, max: 1, value: 1 }, { name: "a2", min: 0, max: 1, value: 0.5 }];
        
        for(let i=3;i<10;i++)sliderinfos.push({ name: "a"+i, min: 0, max: 1, value: 1 });
        createSliderPanelTemplate(sliderinfos,sliderPanel);

        function createSliderPanelTemplate(sliderinfos,sliderPanel){
            let template=sliderPanel.querySelector("template");;
            if(!template){
                template = document.createElement("template");
            template.innerHTML = `
    <div class="slideritem" draggable="true">
      <label>placeholder</label>
      <input type="range" class="slider" min="0" max="1" step="0.01" value="0">
      <span class="value">0</span>
    </div>
  `.trim();
  sliderPanel.appendChild(template);
}

        const sliders=sliderinfos.map(x=>createSliderHTMLTemplate(template,x));
        sliders.forEach((s)=>{
            sliderPanel.appendChild(s);
            s.addEventListener("dragstart",()=>{
                setTimeout(()=>s.classList.add("dragging"),0);
            });
            s.addEventListener("dragend",()=>s.classList.remove("dragging"));
        });
        sliderPanel.addEventListener("dragover",(e)=>{
            e.preventDefault();

            const movingelement=sliderPanel.querySelector(".slideritem.dragging");
            if(!movingelement)return;
            
            for(const prev of sliderPanel.querySelectorAll(".slideritem:not(.dragging)")){
                const bound=prev.getBoundingClientRect();
                if(e.clientY<=bound.top+bound.height/2){
                    sliderPanel.insertBefore(movingelement,prev);
                    return;
                }
            }
            sliderPanel.appendChild(movingelement);
            
        });
    }

      
        



        function createSliderHTMLTemplate(template,{ name, min, max, value,step }) {
            const item = template.content.cloneNode(true).firstElementChild;

            const label = item.querySelector("label");
            const slider = item.querySelector(".slider");
            const valueSpan = item.querySelector(".value");

            label.textContent = `${name}:`;
            slider.min = min??0;
            slider.max = max??1
            slider.step = step??0.01;
            slider.value = value??0;
            valueSpan.textContent = Number(slider.value).toFixed(2);

            slider.addEventListener("input", () => {
                valueSpan.textContent = Number(slider.value).toFixed(2);
            });

            return item;
        }



    </script>

</body>

</html>
