<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>TransformFeedbackWrapper Test</title>
</head>
<body>
<canvas id="glcanvas" width="1" height="1"></canvas>
<script type="module">
import {TransformFeedbackWrapper} from "../jsgaalop/src/glwrapper/TransformFeedbackWrapper.js";

function createGL() {
  const canvas = document.getElementById('glcanvas');
  const gl = canvas.getContext('webgl2');
  if (!gl) throw new Error("WebGL2 not supported");
  return gl;
}

function createInputBuffer(gl, data) {
  const buffer = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buffer);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(data), gl.STATIC_DRAW);
  return buffer;
}

function createVAO(gl, buffer) {
  const vao = gl.createVertexArray();
  gl.bindVertexArray(vao);
  gl.bindBuffer(gl.ARRAY_BUFFER, buffer);
  gl.enableVertexAttribArray(0);
  gl.vertexAttribPointer(0, 1, gl.FLOAT, false, 0, 0);
  gl.bindVertexArray(null);
  return vao;
}

const vertexShaderSrc = `#version 300 es
in float a_value;
out float v_value;
void main() {
  v_value = a_value;
}
`;

function main() {
  const gl = createGL();

  const vertexData = [1.0, 2.0, 3.0, 4.0];
  const vertexCount = vertexData.length;

  const inputBuffer = createInputBuffer(gl, vertexData);
  const vao = createVAO(gl, inputBuffer);
  gl.bindVertexArray(vao);

  const varyings = [
   "v_value"
  ];

  const tfw = new TransformFeedbackWrapper(gl, vertexShaderSrc, varyings);
  const result = tfw.run(vertexCount);

  console.log("Transform Feedback Output:", result[0]);
}

main();

</script>
</body>
</html>
