<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Standalone Slider</title>
  <style>
    body {
      font-family: sans-serif;
      padding: 20px;
      background: #fafafa;
    }

    .slideritem {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #f0f0f0;
      padding: 10px;
      border-radius: 6px;
      max-width: 500px;
    }

    .slideritem label {
      min-width: 50px;
      font-weight: bold;
    }

    .slideritem .slider {
      flex: 1;
    }

    .slideritem .value {
      width: 50px;
      text-align: right;
      font-family: monospace;
    }
  </style>
</head>
<body>

  <div class="slideritem">
    <label for="slider1">a3:</label>
    <input id="slider1" type="range" min="0" max="1" step="0.01" value="0.5" class="slider" />
    <span class="value" id="value1">0.50</span>
  </div>
  <div id="sliderPanel">
    
  </div>

  <script>
    const sliderPanel=document.getElementById("sliderPanel");
    const sliders=[{name:"a1",min:0,max:1,value:1},{name:"a2",min:0,max:1,value:0.5}];

    for(const sliderinfo of sliders){
        const parentDiv=document.createElement("div");
        sliderPanel.appendChild(parentDiv);
        parentDiv.className="slideritem";

        const label=document.createElement("label");
        parentDiv.appendChild(label);
        label.htmlFor=sliderinfo.name;
        label.textContent=sliderinfo.name;

        const slider=document.createElement("input");
        parentDiv.appendChild(slider);
        slider.type="range";
        slider.min=sliderinfo.min;
        slider.max=sliderinfo.max;
        slider.value=sliderinfo.value;
        slider.id=sliderinfo.name;
        slider.step=0.01;
        slider.className="slider";
        
        const value=document.createElement("span");
        parentDiv.appendChild(value);
        value.textContent=slider.value;
        value.className="value";

        slider.addEventListener("input",()=>{value.textContent=slider.value;});
        


    }



    const slider = document.getElementById("slider1");
    const valueDisplay = document.getElementById("value1");

    slider.addEventListener("input", () => {
      valueDisplay.textContent = Number(slider.value).toFixed(2);
    });
  </script>

</body>
</html>
