<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Complex Function Plot</title>
  <style>
    canvas { border: 1px solid black; }
  </style>
</head>
<body>
<canvas id="output" width="256" height="256"></canvas>

<script type="module">
import { TransformFeedbackWrapper } from "../jsgaalop/src/glwrapper/TransformFeedbackWrapper.js";

// === SETUP ===
const visibleCanvas = document.getElementById("output");
const width = visibleCanvas.width;
const height = visibleCanvas.height;
const ctx2d = visibleCanvas.getContext("2d");

const glCanvas = document.createElement("canvas");
glCanvas.width = width;
glCanvas.height = height;
const gl = glCanvas.getContext("webgl2");
if (!gl) throw new Error("WebGL2 not supported");

// === SHADER: Evaluate complex function f(z) ===
const vertexShaderSource = `#version 300 es

precision highp float;

uniform float u_width;
uniform float u_height;
uniform float u_scale;
uniform vec2 u_offset;

out vec4 v_color;

vec3 hsv2rgb(vec3 c) {
  vec4 K = vec4(1.0, 2.0/3.0, 1.0/3.0, 3.0);
  vec3 p = abs(fract(c.xxx + K.xyz) * 6.0 - K.www);
  return c.z * mix(K.xxx, clamp(p - K.xxx, 0.0, 1.0), c.y);
}

vec2 cmul(vec2 a, vec2 b) {
  return vec2(a.x*b.x - a.y*b.y, a.x*b.y + a.y*b.x);
}

void main() {
  uint idx = uint(gl_VertexID);
  float x = float(idx % uint(u_width));
  float y = float(idx / uint(u_width));

  vec2 z = u_offset + vec2(
    (x / u_width - 0.5) * u_scale,
    (y / u_height - 0.5) * u_scale
  );

  vec2 fz = cmul(z, z); // f(z) = z²
  float mag = length(fz);
  float phase = atan(fz.y, fz.x);

  vec3 hsv = vec3(phase / 6.28318 + 0.5, 1.0, smoothstep(0.0, 1.0, log(mag + 1.0)));
  vec3 rgb = hsv2rgb(hsv);

  v_color = vec4(rgb, 1.0);
}
`;

// === VARYINGS ===
const varyings = ["v_color"];
const tf = new TransformFeedbackWrapper(gl, vertexShaderSource, varyings);

// === UNIFORMS ===
tf.useshader();
gl.uniform1f(gl.getUniformLocation(tf.shader.program, "u_width"), width);
gl.uniform1f(gl.getUniformLocation(tf.shader.program, "u_height"), height);
gl.uniform1f(gl.getUniformLocation(tf.shader.program, "u_scale"), 4.0); // zoom
gl.uniform2f(gl.getUniformLocation(tf.shader.program, "u_offset"), 0.0, 0.0); // center

// === RUN TF ===
const pixelCount = width * height;
const results = tf.run(pixelCount);
const rgba = results[0];

// === DRAW ===
const imgData = ctx2d.createImageData(width, height);
for (let i = 0; i < rgba.length / 4; i++) {
  imgData.data[4*i+0] = Math.min(255, Math.max(0, rgba[4*i+0] * 255));
  imgData.data[4*i+1] = Math.min(255, Math.max(0, rgba[4*i+1] * 255));
  imgData.data[4*i+2] = Math.min(255, Math.max(0, rgba[4*i+2] * 255));
  imgData.data[4*i+3] = 255;
}
ctx2d.putImageData(imgData, 0, 0);
</script>
</body>
</html>
